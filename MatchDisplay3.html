<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Indy Classic — Courts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1:         #0f172a;
    --bg2:         #1e293b;
    --glass:       rgba(255,255,255,.10);
    --glassBorder: rgba(255,255,255,.18);
    --glassDark:   rgba(255,255,255,.06);
    --text:        rgba(255,255,255,.92);
    --muted:       rgba(255,255,255,.62);
    --muted2:      rgba(255,255,255,.38);
    --shadow:      0 18px 50px rgba(0,0,0,.40);
    --radius:      14px;
    --accent:      rgba(99,102,241,1);
    --green:       rgba(34,197,94,1);
    --green-dim:   rgba(34,197,94,.22);
    --green-glow:  rgba(34,197,94,.45);
    --amber:       rgba(251,191,36,1);
    --amber-dim:   rgba(251,191,36,.20);
    --red:         rgba(244,63,94,1);
    --red-dim:     rgba(244,63,94,.22);
    --live-border: rgba(34,197,94,.55);
    --live-bg:     rgba(34,197,94,.07);
    --live-shadow: 0 0 0 1px rgba(34,197,94,.5), 0 0 28px rgba(34,197,94,.18), 0 8px 32px rgba(0,0,0,.5);
    --hot-border:  rgba(251,191,36,.65);
    --hot-bg:      rgba(251,191,36,.07);
    --hot-shadow:  0 0 0 1px rgba(251,191,36,.5), 0 0 28px rgba(251,191,36,.18), 0 8px 32px rgba(0,0,0,.5);
    font-family: 'Barlow', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background:
      radial-gradient(1200px 700px at 20% 10%, rgba(99,102,241,.28), transparent 60%),
      radial-gradient(900px 600px at 85% 30%, rgba(34,197,94,.16), transparent 55%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    color: var(--text);
  }

  .blob {
    position: fixed;
    border-radius: 999px;
    filter: blur(50px);
    opacity: .20;
    z-index: 0;
    pointer-events: none;
  }
  .blob.b1 { width:440px; height:440px; top:-160px; left:-160px; background:rgba(56,189,248,.9); }
  .blob.b2 { width:440px; height:440px; bottom:-180px; right:-160px; background:rgba(168,85,247,.9); }

  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ══════════ HEADER ══════════ */
  .tv-header {
    flex: 0 0 62px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    background: rgba(15,23,42,.55);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--glassBorder);
    position: relative;
    z-index: 10;
  }

  .hd-left { display:flex; align-items:baseline; gap:14px; }

  .hd-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 900;
    letter-spacing: .05em; text-transform: uppercase;
  }

  .hd-subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14px; font-weight: 700;
    letter-spacing: .14em; text-transform: uppercase;
    color: var(--muted);
  }

  .hd-center { display:flex; align-items:center; gap:18px; }

  .hd-live {
    display:flex; align-items:center; gap:7px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 800;
    letter-spacing: .14em; text-transform: uppercase;
    color: var(--green);
  }

  .hd-live-dot {
    width:8px; height:8px; border-radius:50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green-glow);
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%,100% { opacity:1; box-shadow:0 0 6px var(--green-glow); }
    50%      { opacity:.5; box-shadow:0 0 16px var(--green-glow); }
  }

  .hd-refresh { font-size:11px; color:var(--muted2); }

  .hd-right { display:flex; flex-direction:column; align-items:flex-end; gap:1px; }

  .hd-clock {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px; font-weight: 800;
    letter-spacing: .04em; line-height: 1;
  }

  .hd-date {
    font-size: 10px; font-weight: 500;
    color: var(--muted);
    letter-spacing: .08em; text-transform: uppercase;
  }

  /* ══════════ ERROR BAR ══════════ */
  .err-bar {
    position: fixed; top:62px; left:0; right:0;
    background: var(--red-dim);
    border-bottom: 1px solid rgba(244,63,94,.4);
    color: var(--red); font-size:12px; font-weight:600;
    padding: 6px 24px; z-index:20; display:none;
  }
  .err-bar.show { display:block; }

  /* ══════════ MAIN ══════════ */
  .tv-main {
    flex: 1 1 0;
    min-height: 0;
    padding: 12px 16px 10px;
    position: relative; z-index:1;
    overflow: hidden;
  }

  /* ══════════ COURTS GRID 4×4 ══════════ */
  .courts-grid {
    height: 100%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 10px;
  }

  /* ── Court card ── */
  .court {
    background: var(--glass);
    border: 1px solid var(--glassBorder);
    border-radius: var(--radius);
    padding: 9px 12px 8px;
    display: flex; flex-direction: column;
    position: relative; overflow: hidden;
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    transition: border-color .3s, box-shadow .3s, background .3s;
  }

  .court::after {
    content: '';
    position: absolute; top:-40%; left:-20%;
    width:60%; height:120%;
    transform: rotate(18deg);
    background: radial-gradient(circle at 30% 40%, rgba(255,255,255,.14), transparent 55%);
    opacity: .28; pointer-events:none;
  }

  .court.live {
    background: var(--live-bg);
    border-color: var(--live-border);
    box-shadow: var(--live-shadow);
  }

  .court.hot {
    background: var(--hot-bg);
    border-color: var(--hot-border);
    box-shadow: var(--hot-shadow);
  }

  /* ── Court top ── */
  .court-top {
    display: flex; align-items:center;
    justify-content:space-between; gap:5px;
    margin-bottom: 5px;
    position: relative; z-index:1;
  }

  .court-num {
    font-family:'Barlow Condensed',sans-serif;
    font-size:12px; font-weight:800;
    letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); flex-shrink:0;
  }

  .court-event {
    font-size:9.5px; font-weight:600; color:var(--muted2);
    letter-spacing:.04em; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;
    flex:1 1 0; min-width:0; text-align:center;
  }

  .court-badge {
    font-family:'Barlow Condensed',sans-serif;
    font-size:9.5px; font-weight:800;
    letter-spacing:.12em; text-transform:uppercase;
    padding:2px 7px; border-radius:4px;
    border:1px solid var(--glassBorder);
    background:var(--glassDark); color:var(--muted);
    flex-shrink:0;
  }

  .court-badge.live {
    background:var(--green-dim);
    border-color:rgba(34,197,94,.4); color:var(--green);
    animation: badge-pulse 2.5s ease-in-out infinite;
  }

  .court-badge.hot {
    background:var(--amber-dim);
    border-color:rgba(251,191,36,.4); color:var(--amber);
    animation: badge-pulse 2s ease-in-out infinite;
  }

  @keyframes badge-pulse {
    0%,100%{ opacity:1; } 50%{ opacity:.5; }
  }

  .court-divider {
    height:1px; background:rgba(255,255,255,.12);
    margin:0 0 5px; position:relative; z-index:1;
  }

  /* ── Players ── */
  .court-players {
    flex:1 1 0; display:flex; flex-direction:column;
    justify-content:center; gap:2px;
    position:relative; z-index:1; min-height:0;
  }

  .player-row {
    display:flex; align-items:center; gap:6px; min-width:0;
  }

  .player-dot {
    width:5px; height:5px; border-radius:50%; flex-shrink:0;
    background:rgba(255,255,255,.22); transition:background .3s;
  }
  .court.live .player-dot { background:var(--green); box-shadow:0 0 5px var(--green-glow); }
  .court.hot  .player-dot { background:var(--amber); box-shadow:0 0 5px rgba(251,191,36,.5); }

  /* Singles name */
  .player-name {
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;
    font-size:clamp(12px,1.2vw,19px);
    letter-spacing:.01em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    min-width:0; flex:1; line-height:1.2;
    color:var(--muted); transition:color .3s;
  }
  .court.live .player-name,
  .court.hot  .player-name { color:var(--text); }

  /* Doubles: two names stacked */
  .player-name-stack {
    display:flex; flex-direction:column;
    gap:0; min-width:0; flex:1;
  }
  .pname {
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;
    font-size:clamp(10px,1vw,16px);
    letter-spacing:.01em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    line-height:1.2; color:var(--muted); transition:color .3s;
  }
  .court.live .pname,
  .court.hot  .pname { color:var(--text); }

  .vs-divider {
    display:flex; align-items:center; gap:5px;
    padding:1px 0; position:relative; z-index:1;
  }
  .vs-line { flex:1; height:1px; background:rgba(255,255,255,.10); }
  .vs-label {
    font-family:'Barlow Condensed',sans-serif;
    font-size:9px; font-weight:800;
    letter-spacing:.18em; color:var(--muted2); text-transform:uppercase;
  }

  /* ── Time bar ── */
  .court-times {
    margin-top:5px; padding:4px 6px;
    border-radius:7px;
    background:rgba(0,0,0,.22);
    border:1px solid rgba(255,255,255,.08);
    display:flex; justify-content:space-between; gap:2px;
    flex-shrink:0; position:relative; z-index:1;
  }

  .time-item {
    display:flex; flex-direction:column;
    align-items:center; gap:1px;
    min-width:0; flex:1;
  }
  .time-item + .time-item { border-left:1px solid rgba(255,255,255,.08); }

  .time-label {
    font-size:7px; font-weight:700;
    letter-spacing:.10em; text-transform:uppercase;
    color:var(--muted2); white-space:nowrap;
  }

  .time-value {
    font-family:'Barlow Condensed',sans-serif;
    font-size:clamp(9px,.8vw,12px); font-weight:700;
    color:var(--muted); white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;
    max-width:100%; text-align:center;
  }
  .court.live .time-value,
  .court.hot  .time-value { color:var(--text); }

  .dur-val { color:var(--green) !important; }
  .court.hot .dur-val { color:var(--amber) !important; }

  /* ══════════ FOOTER ══════════ */
  .tv-footer {
    flex: 0 0 52px;
    min-height: 52px;
    max-height: 52px;
    background: rgba(15,23,42,.65);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--glassBorder);
    display: flex; align-items: stretch;
    position: relative; z-index:10;
    overflow: hidden;
  }

  .footer-section {
    display:flex; align-items:center;
    padding:0 16px; gap:8px; flex-shrink:0;
    border-right:1px solid rgba(255,255,255,.10);
  }

  .footer-label {
    font-family:'Barlow Condensed',sans-serif;
    font-size:9px; font-weight:800;
    letter-spacing:.15em; text-transform:uppercase;
    color:var(--accent); opacity:.8; white-space:nowrap;
  }

  .footer-value {
    font-family:'Barlow Condensed',sans-serif;
    font-size:13px; font-weight:700;
    color:var(--text); white-space:nowrap;
    max-width:240px; overflow:hidden; text-overflow:ellipsis;
  }

  .footer-meta {
    font-size:10px; color:var(--muted);
    white-space:nowrap; max-width:240px;
    overflow:hidden; text-overflow:ellipsis;
  }

  /* Ticker */
  .footer-upcoming {
    flex:1 1 0; min-width:0;
    display:flex; align-items:center;
    padding:0 12px; gap:10px; overflow:hidden;
  }

  .upcoming-label {
    font-family:'Barlow Condensed',sans-serif;
    font-size:9px; font-weight:800;
    letter-spacing:.15em; text-transform:uppercase;
    color:var(--amber); opacity:.85;
    white-space:nowrap; flex-shrink:0;
  }

  .upcoming-track {
    flex:1 1 0; min-width:0; overflow:hidden;
    position:relative; height:100%;
    display:flex; align-items:center;
  }

  .upcoming-track::before,
  .upcoming-track::after {
    content:''; position:absolute; top:0; bottom:0;
    width:28px; z-index:2; pointer-events:none;
  }
  .upcoming-track::before { left:0; background:linear-gradient(90deg,rgba(15,23,42,.75),transparent); }
  .upcoming-track::after  { right:0; background:linear-gradient(270deg,rgba(15,23,42,.75),transparent); }

  .upcoming-inner {
    display:flex; align-items:center;
    white-space:nowrap;
    animation:ticker 40s linear infinite;
    will-change:transform;
  }
  .upcoming-inner:hover { animation-play-state:paused; }

  @keyframes ticker {
    0%   { transform:translateX(0); }
    100% { transform:translateX(-50%); }
  }

  .upcoming-match {
    display:inline-flex; align-items:center;
    gap:7px; padding:0 18px;
    border-right:1px solid rgba(255,255,255,.12);
  }

  .upcoming-num {
    font-family:'Barlow Condensed',sans-serif;
    font-size:10px; font-weight:900;
    background:rgba(251,191,36,.18);
    border:1px solid rgba(251,191,36,.35);
    color:var(--amber); border-radius:4px;
    padding:1px 5px; letter-spacing:.05em;
    flex-shrink:0;
  }

  .upcoming-teams {
    font-family:'Barlow Condensed',sans-serif;
    font-size:14px; font-weight:700; color:var(--text);
  }

  .upcoming-time {
    font-family:'Barlow Condensed',sans-serif;
    font-size:12px; font-weight:600;
    color:var(--amber); opacity:.85;
  }

  .footer-right {
    flex-shrink:0; display:flex; align-items:center;
    padding:0 14px;
    border-left:1px solid rgba(255,255,255,.10);
  }
  .footer-right .footer-meta { text-align:right; }
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>

<header class="tv-header">
  <div class="hd-left">
    <span class="hd-title">Indy Classic</span>
    <span class="hd-subtitle">Court Assignments</span>
  </div>
  <div class="hd-center">
    <div class="hd-live"><div class="hd-live-dot"></div>Live</div>
    <div class="hd-refresh" id="lastRefreshStamp">—</div>
  </div>
  <div class="hd-right">
    <div class="hd-clock" id="liveClock">--:--</div>
    <div class="hd-date"  id="liveDate">—</div>
  </div>
</header>

<div class="err-bar" id="errorBar"></div>

<main class="tv-main">
  <div class="courts-grid" id="courtsGrid" aria-label="Courts"></div>
</main>

<footer class="tv-footer">
  <div class="footer-section">
    <div>
      <div class="footer-label">Last Placed</div>
      <div class="footer-value" id="lastMatchName">—</div>
      <div class="footer-meta"  id="lastMatchMeta">—</div>
    </div>
  </div>

  <div class="footer-upcoming">
    <div class="upcoming-label">Up Next</div>
    <div class="upcoming-track">
      <div class="upcoming-inner" id="upcomingInner">
        <div class="upcoming-match"><span class="upcoming-teams">Loading…</span></div>
      </div>
    </div>
  </div>

  <div class="footer-right">
    <div class="footer-meta">Auto-refresh<br>every 30 sec</div>
  </div>
</footer>

<script>
  const JSON_URL       = "https://script.google.com/macros/s/AKfycbwv9yiFvW1VBrY_iL9T5ZvhUH_2ygptxukgt8dj5ZaEFSw63fQopzcAfIwETaTx5WJ7/exec";
  const NUM_COURTS     = 16;
  const UPCOMING_COUNT = 8;
  const REFRESH_MS     = 30000;
  const HOT_MINUTES    = 120;

  const courtsGrid       = document.getElementById('courtsGrid');
  const errorBar         = document.getElementById('errorBar');
  const lastRefreshStamp = document.getElementById('lastRefreshStamp');
  const lastMatchName    = document.getElementById('lastMatchName');
  const lastMatchMeta    = document.getElementById('lastMatchMeta');
  const upcomingInner    = document.getElementById('upcomingInner');
  const liveClock        = document.getElementById('liveClock');
  const liveDate         = document.getElementById('liveDate');

  let loading = false;

  /* ── Clock ── */
  function tickClock(){
    const now = new Date();
    let h = now.getHours(); const m = now.getMinutes();
    const ampm = h >= 12 ? 'PM' : 'AM'; h = h % 12 || 12;
    liveClock.textContent = `${h}:${String(m).padStart(2,'0')} ${ampm}`;
    liveDate.textContent  = now.toLocaleDateString(undefined,{
      weekday:'long', month:'long', day:'numeric', year:'numeric'
    });
  }
  tickClock();
  setInterval(tickClock, 10000);

  /* ── Duration live-tick + hot-state upgrade ── */
  setInterval(() => {
    document.querySelectorAll('.dur-val[data-started]').forEach(el => {
      el.textContent = formatDuration(new Date(el.dataset.started));
    });
    document.querySelectorAll('.court.live').forEach(card => {
      const durEl = card.querySelector('.dur-val[data-started]');
      if(!durEl) return;
      if((new Date() - new Date(durEl.dataset.started)) / 60000 >= HOT_MINUTES){
        card.classList.remove('live'); card.classList.add('hot');
        const badge = card.querySelector('[data-badge]');
        if(badge){ badge.textContent='2h+ 🔥'; badge.className='court-badge hot'; }
      }
    });
  }, 60000);

  /* ── Name abbreviation ── */
  function abbrevName(n){
    const parts = String(n||'').trim().split(/\s+/);
    if(!parts[0]) return n;
    return parts[0][0].toUpperCase() + '. ' + parts.slice(1).join(' ');
  }

  function parseTeams(rawT1, rawT2){
    const t1 = String(rawT1||'').trim();
    const t2 = String(rawT2||'').trim();
    const p1 = t1 ? t1.split('+').map(s=>s.trim()).filter(Boolean) : [];
    const p2 = t2 ? t2.split('+').map(s=>s.trim()).filter(Boolean) : [];
    const total = p1.length + p2.length;

    if(total <= 2){
      return { t1d: p1.map(abbrevName).join(' / '), t2d: p2.map(abbrevName).join(' / '), dbl: false };
    }
    // All 4 names in t1 with 3 '+' separators
    if(p1.length === 4 && p2.length === 0){
      return {
        t1d: [p1[0],p1[1]].map(abbrevName).join(' / '),
        t2d: [p1[2],p1[3]].map(abbrevName).join(' / '),
        dbl: true
      };
    }
    // Both sides have players
    if(p1.length >= 2 && p2.length >= 2){
      return { t1d: p1.map(abbrevName).join(' / '), t2d: p2.map(abbrevName).join(' / '), dbl: true };
    }
    // Odd splits — best effort
    const all = [...p1,...p2];
    const half = Math.ceil(all.length/2);
    return {
      t1d: all.slice(0,half).map(abbrevName).join(' / '),
      t2d: all.slice(half).map(abbrevName).join(' / '),
      dbl: true
    };
  }

  /* ── Utils ── */
  const tidy = v => (v==null?'':String(v).trim());

  function esc(s){
    return String(s).replace(/[&<>"']/g,c=>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function isCourtEmpty(v){
    const t=tidy(v).toLowerCase();
    return !t||['na','n/a','none','null','-','—','0'].includes(t);
  }

  function parseTimeToday(s){
    const str=tidy(s); if(!str) return null;
    let m=str.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?\s*([ap]m)$/i);
    if(m){
      let[,hh,mm,ss,ap]=m; let h=parseInt(hh,10);
      const min=parseInt(mm,10),sec=ss?parseInt(ss,10):0;
      ap=ap.toLowerCase(); if(h===12)h=0; if(ap==='pm')h+=12;
      const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate(),h,min,sec,0);
    }
    m=str.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
    if(m){
      let[,hh,mm,ss]=m; const h=parseInt(hh,10),min=parseInt(mm,10),sec=ss?parseInt(ss,10):0;
      if(h>=0&&h<24&&min>=0&&min<60){
        const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate(),h,min,sec,0);
      }
    }
    const d=new Date(str); return isNaN(d.getTime())?null:d;
  }

  function toDateOrNull(v){
    const s=tidy(v); if(!s) return null;
    const d=new Date(s); if(!isNaN(d.getTime())) return d;
    return parseTimeToday(s);
  }

  function formatTime(dt){
    if(!dt) return '—';
    let h=dt.getHours(); const m=dt.getMinutes();
    const ampm=h>=12?'PM':'AM'; h=h%12||12;
    return `${h}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  function formatDuration(since){
    if(!since) return '—';
    const diff=(new Date()-since)/60000;
    if(diff<1) return 'Just started';
    const hrs=Math.floor(diff/60), mins=Math.floor(diff%60);
    if(hrs>0) return `${hrs}h ${mins}m`;
    return `${mins} min`;
  }

  /* ── Build shells ── */
  function buildCourtShells(){
    courtsGrid.innerHTML='';
    for(let i=1;i<=NUM_COURTS;i++){
      const card=document.createElement('article');
      card.className='court empty'; card.dataset.court=i;
      card.innerHTML=`
        <div class="court-top">
          <div class="court-num">Court ${i}</div>
          <div class="court-event" data-event></div>
          <div class="court-badge" data-badge>Empty</div>
        </div>
        <div class="court-divider"></div>
        <div class="court-players">
          <div class="player-row">
            <div class="player-dot"></div>
            <div class="player-name" data-team1>—</div>
          </div>
          <div class="vs-divider">
            <div class="vs-line"></div>
            <div class="vs-label">VS</div>
            <div class="vs-line"></div>
          </div>
          <div class="player-row">
            <div class="player-dot"></div>
            <div class="player-name" data-team2>—</div>
          </div>
        </div>
        <div class="court-times">
          <div class="time-item">
            <div class="time-label">Sched</div>
            <div class="time-value" data-sched>—</div>
          </div>
          <div class="time-item">
            <div class="time-label">Started</div>
            <div class="time-value" data-started-val>—</div>
          </div>
          <div class="time-item">
            <div class="time-label">Duration</div>
            <div class="time-value dur-val" data-dur>—</div>
          </div>
        </div>`;
      courtsGrid.appendChild(card);
    }
  }

  /* ── Set player name cell (singles or doubles) ── */
  function setPlayerCell(el, displayText, isDoubles){
    if(!isDoubles || !displayText.includes(' / ')){
      el.className='player-name';
      el.textContent=displayText||'—';
      return;
    }
    const names=displayText.split(' / ');
    el.className='player-name-stack';
    el.innerHTML=names.map(n=>`<span class="pname">${esc(n)}</span>`).join('');
  }

  /* ── Render ── */
  function renderFromRows(rows){
    buildCourtShells();

    const normalized=rows.map((r,idx)=>{
      const startRaw=tidy(r['Start Time']), timeRaw=tidy(r['Time']);
      const courtRaw=tidy(r['Court'])||tidy(r['Court #']);
      const rawT1=tidy(r['Team 1'])||tidy(r['Team1']);
      const rawT2=tidy(r['Team 2'])||tidy(r['Team2']);
      const event=tidy(r['Event']), round=tidy(r['Round']);
      const num=parseInt(courtRaw,10);
      const court=(!isCourtEmpty(courtRaw)&&!isNaN(num))?num:null;
      const startTime=toDateOrNull(startRaw);
      const time=parseTimeToday(timeRaw)??null;
      const {t1d,t2d,dbl}=parseTeams(rawT1,rawT2);
      return {_row:idx,startTime,time,event,round,rawT1,rawT2,t1d,t2d,dbl,court};
    });

    /* Last placed */
    const placed=normalized.filter(r=>r.court!=null&&(r.time||r.startTime));
    let lastPlaced=null;
    for(const r of placed){
      const key=r.time??r.startTime;
      const bk=lastPlaced?(lastPlaced.time??lastPlaced.startTime):null;
      if(!lastPlaced||key.getTime()>bk.getTime()) lastPlaced=r;
    }
    if(lastPlaced){
      lastMatchName.textContent=`${lastPlaced.t1d||'—'} vs ${lastPlaced.t2d||'—'}`;
      lastMatchMeta.textContent=`Court ${lastPlaced.court} · Sched: ${formatTime(lastPlaced.startTime)} · Started: ${formatTime(lastPlaced.time)}`;
    } else {
      lastMatchName.textContent='—'; lastMatchMeta.textContent='—';
    }

    /* Latest per court */
    const latestByCourt=new Map();
    for(const r of normalized){
      if(r.court==null) continue;
      const key=r.time??r.startTime??null; if(!key) continue;
      const prev=latestByCourt.get(r.court);
      const pk=prev?(prev.time??prev.startTime):null;
      if(!prev||key.getTime()>pk.getTime()) latestByCourt.set(r.court,r);
    }

    for(const [num,row] of latestByCourt.entries()){
      const card=document.querySelector(`.court[data-court="${num}"]`);
      if(!card) continue;

      setPlayerCell(card.querySelector('[data-team1]'),row.t1d,row.dbl);
      setPlayerCell(card.querySelector('[data-team2]'),row.t2d,row.dbl);

      const evTxt=[row.event,row.round].filter(Boolean).join(' · ');
      card.querySelector('[data-event]').textContent=evTxt;
      card.querySelector('[data-sched]').textContent=formatTime(row.startTime);
      card.querySelector('[data-started-val]').textContent=formatTime(row.time);

      const durEl=card.querySelector('[data-dur]');
      if(row.time){
        durEl.textContent=formatDuration(row.time);
        durEl.dataset.started=row.time.toISOString();
      } else {
        durEl.textContent='—'; delete durEl.dataset.started;
      }

      card.classList.remove('empty');
      const hot=row.time&&((new Date()-row.time)/60000>=HOT_MINUTES);
      const badge=card.querySelector('[data-badge]');
      if(hot){
        card.classList.add('hot');
        badge.textContent='2h+ 🔥'; badge.className='court-badge hot';
      } else {
        card.classList.add('live');
        badge.textContent='Live'; badge.className='court-badge live';
      }
    }

    /* Upcoming ticker */
    const upcoming=normalized
      .filter(r=>r.court==null)
      .sort((a,b)=>{
        const ak=(a.startTime??a.time??new Date(8640000000000000)).getTime();
        const bk=(b.startTime??b.time??new Date(8640000000000000)).getTime();
        return ak-bk;
      })
      .slice(0,UPCOMING_COUNT);

    if(upcoming.length===0){
      upcomingInner.innerHTML=`<div class="upcoming-match"><span class="upcoming-teams">No upcoming matches</span></div>`;
    } else {
      const items=upcoming.map((r,i)=>{
        const when=formatTime(r.startTime??r.time);
        const mt=esc(`${r.t1d||'—'} vs ${r.t2d||'—'}`);
        return `<div class="upcoming-match">
          <span class="upcoming-num">${i+1}</span>
          <span class="upcoming-teams">${mt}</span>
          <span class="upcoming-time">${when}</span>
        </div>`;
      }).join('');
      upcomingInner.innerHTML=items+items;
      requestAnimationFrame(()=>{
        const w=upcomingInner.scrollWidth/2;
        upcomingInner.style.animationDuration=Math.max(20,w/45)+'s';
      });
    }
  }

  /* ── Fetch ── */
  function loadData(){
    if(loading) return; loading=true;
    fetch(JSON_URL+'?t='+Date.now())
      .then(r=>r.json())
      .then(rows=>{
        try{
          renderFromRows(rows);
          const n=new Date(); let h=n.getHours(); const m=n.getMinutes();
          const ap=h>=12?'PM':'AM'; h=h%12||12;
          lastRefreshStamp.textContent=`Updated ${h}:${String(m).padStart(2,'0')} ${ap}`;
          errorBar.classList.remove('show');
        }catch(e){ showError('Render error: '+e.message); console.error(e); }
        finally { loading=false; }
      })
      .catch(e=>{ showError('Load failed: '+e.message); loading=false; console.error(e); });
  }

  function showError(msg){ errorBar.textContent='⚠ '+msg; errorBar.classList.add('show'); }

  buildCourtShells();
  loadData();
  setInterval(loadData,REFRESH_MS);
</script>
</body>
