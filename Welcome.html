<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Welcome Party Info – Indy Classic 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
--bg1:#0f172a;
--bg2:#1e293b;
--text: rgba(255,255,255,.92);
--muted: rgba(255,255,255,.70);
--glass: rgba(255,255,255,.10);
--glassBorder: rgba(255,255,255,.18);
--shadow: 0 18px 50px rgba(0,0,0,.35);
--radius: 22px;
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{height:auto;min-height:100%;}

body{
font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
color:var(--text);
background:
radial-gradient(1200px 700px at 20% 10%, rgba(99,102,241,.28), transparent 60%),
radial-gradient(900px 600px at 85% 30%, rgba(34,197,94,.18), transparent 55%),
linear-gradient(135deg,var(--bg1),var(--bg2));
min-height:100vh;
display:flex;
align-items:flex-start;
justify-content:center;
padding:24px;
overflow-x:hidden;
overflow-y:auto;
-webkit-overflow-scrolling:touch;
}

.blob{
position:fixed;
width:420px;
height:420px;
border-radius:999px;
filter:blur(45px);
opacity:.22;
z-index:0;
pointer-events:none;
}

.blob.b1{top:-140px;left:-140px;background:rgba(56,189,248,.9);}
.blob.b2{bottom:-180px;right:-140px;background:rgba(168,85,247,.9);}

.card{
width:min(720px,100%);
padding:40px 30px 0 30px;
border-radius:var(--radius);
background:var(--glass);
border:1px solid var(--glassBorder);
box-shadow:var(--shadow);
backdrop-filter:blur(16px);
-webkit-backdrop-filter:blur(16px);
position:relative;
z-index:1;
text-align:center;
overflow:hidden;
}

.logo{
width:140px;
height:140px;
border-radius:50%;
object-fit:cover;
margin-bottom:18px;
border:3px solid rgba(255,255,255,.6);
box-shadow:0 14px 30px rgba(0,0,0,.35);
background:rgba(255,255,255,.08);
}

h1{
font-size:30px;
font-weight:800;
margin-bottom:8px;
letter-spacing:-0.02em;
}

.subtitle{
font-size:14px;
color:var(--muted);
margin-bottom:22px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
text-align:left;
margin-bottom:18px;
}

.tile{
border-radius:16px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.12);
padding:14px;
}

.label{
font-size:12px;
letter-spacing:.08em;
text-transform:uppercase;
color:rgba(255,255,255,.65);
margin-bottom:6px;
}

.value{
font-size:14.5px;
font-weight:700;
line-height:1.35;
}

.value a{
color:#38bdf8;
text-decoration:none;
font-weight:800;
}

.value a:hover{text-decoration:underline;}

.note{
margin-top:10px;
padding:14px;
border-radius:16px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.12);
text-align:left;
line-height:1.55;
font-size:14px;
color:rgba(255,255,255,.88);
}

.note strong{color:rgba(255,255,255,.95);}

.raffle{
margin-top:16px;
text-align:left;
padding:14px;
border-radius:16px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.12);
margin-bottom:28px;
}

.raffle h2{
margin:0 0 10px 0;
font-size:15px;
font-weight:900;
letter-spacing:-0.01em;
}

.raffle ul{
margin:0;
padding-left:18px;
line-height:1.7;
color:rgba(255,255,255,.88);
font-size:14px;
}

/* FULL BLEED IMAGE */
.banquet-image{
width:100%;
display:block;
margin-top:10px;
border-radius:0 0 var(--radius) var(--radius);
}

@media(max-width:640px){
.grid{grid-template-columns:1fr;}
}

@media(max-width:480px){
.card{padding:32px 22px 0 22px;}
.logo{width:110px;height:110px;}
h1{font-size:24px;}
.subtitle{font-size:13px;}
}
</style>
</head>

<body>

<div class="blob b1"></div>
<div class="blob b2"></div>

<div class="card">

<img src="profile.jpg" alt="Indy Classic Logo" class="logo">

<h1>Welcome Party Info</h1>
<div class="subtitle">MEET OTHER PLAYERS * TALK TRASH * WIN PRIZES</div>

<div class="grid">

<div class="tile">
<div class="label">Time</div>
<div class="value">7PM–9PM • Thursday, May 28th</div>
</div>

<div class="tile">
<div class="label">Location</div>
<div class="value">Metro</div>
</div>

<div class="tile">
<div class="label">Address</div>
<div class="value">
<a href="https://www.google.com/maps?q=707+Massachusetts+Ave,+Indianapolis,+IN+46204" target="_blank" rel="noopener noreferrer">
707 Massachusetts Ave, Indianapolis, IN 46204 ↗
</a>
</div>
</div>

<div class="tile">
<div class="label">Food and Drink</div>
<div class="value">First $400 Bar Tab on Us + Finger Foods</div>
</div>

</div>

</div>

</body>
</html>
