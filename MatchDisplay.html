<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Indy Classic — Courts</title>

<link rel="preconnect" href="https://cdn.jsdelivr.net">
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
  :root{
    --bg1:#0f172a;
    --bg2:#1e293b;
    --text: rgba(255,255,255,.92);
    --muted: rgba(255,255,255,.72);
    --glass: rgba(255,255,255,.10);
    --glassBorder: rgba(255,255,255,.18);
    --shadow: 0 18px 50px rgba(0,0,0,.35);
    --radius: 18px;

    --ok: rgba(34,197,94,.18);
    --danger: rgba(244,63,94,.18);
  }

  *{box-sizing:border-box}
  html,body{height:100%}

  body{
    margin:0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    color: var(--text);
    background:
      radial-gradient(1200px 700px at 20% 10%, rgba(99,102,241,.28), transparent 60%),
      radial-gradient(900px 600px at 85% 30%, rgba(34,197,94,.18), transparent 55%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    min-height:100vh;
    padding: 18px;
    overflow-x:hidden;
  }

  .blob{
    position:fixed;
    width:440px; height:440px;
    border-radius:999px;
    filter: blur(44px);
    opacity:.22;
    z-index:0;
    pointer-events:none;
  }
  .blob.b1{ top:-160px; left:-160px; background: rgba(56,189,248,.95); }
  .blob.b2{ bottom:-200px; right:-170px; background: rgba(168,85,247,.95); }

  .wrap{
    width:min(100%, 1680px);
    margin:0 auto;
    position:relative;
    z-index:1;
  }

  header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:14px;
    margin: 4px 0 14px;
  }

  .titleblock{
    display:flex;
    flex-direction:column;
    gap:6px;
    min-width:0;
  }

  h1{
    margin:0;
    font-size: clamp(24px, 2vw, 32px);
    font-weight:850;
    letter-spacing:-0.02em;
    line-height:1.1;
  }

  .ts{
    font-size: 12.5px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .statusline{
    display:flex;
    align-items:flex-end;
    gap:12px;
    flex-wrap:wrap;
    justify-content:flex-end;
    text-align:right;
  }

  .panel{
    background: var(--glass);
    border: 1px solid var(--glassBorder);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  .panel-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:10px;
    padding: 2px 2px 10px;
  }

  .panel-head h2{
    margin:0;
    font-size:15px;
    font-weight:850;
    letter-spacing:-0.01em;
  }

  .dashboard{
    display:grid;
    grid-template-columns: 440px minmax(0, 1fr);
    gap: 16px;
    align-items:start;
  }

  .sidebar{
    display:flex;
    flex-direction:column;
    gap: 16px;
  }

  .lastmatch{
    padding: 12px 12px 10px;
  }

  .pillrow{
    display:flex;
    flex-direction:column;
    gap: 8px;
    padding: 4px 2px 2px;
  }

  .pill{
    font-size: 12.5px;
    color: rgba(255,255,255,.85);
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.12);
    padding: 8px 10px;
    border-radius: 999px;
    display:flex;
    align-items:center;
    min-width:0;
    overflow:hidden;
  }

  .pill b{
    color: rgba(255,255,255,.92);
    font-weight: 850;
  }

  .fit{
    display:block;
    width:100%;
    min-width:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:clip;
    line-height:1.15;
    transform: translateZ(0);
  }

  .upcoming{
    padding: 12px 12px 10px;
  }

  .up-list{
    margin:0;
    padding:2px;
    list-style:none;
    display:flex;
    flex-direction:column;
    gap: 10px;
  }

  .up-list li{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 14px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.12);
    min-width:0;
  }

  .up-left{
    min-width:0;
    flex:1 1 auto;
    display:flex;
    align-items:center;
  }

  .up-match{
    font-size: 13px;
    font-weight: 700;
  }

  .up-time{
    flex: 0 0 116px;
    justify-content:center;
    text-align:center;
    padding: 8px 8px;
  }

  .up-time .fit{
    width:100%;
    text-align:center;
  }

  .err{
    margin: 10px 2px 2px;
    padding: 10px 12px;
    border-radius: 14px;
    background: var(--danger);
    border: 1px solid rgba(255,255,255,.18);
    color: rgba(255,255,255,.92);
    font-weight: 750;
  }

  .courts-grid{
    display:grid;
    grid-template-columns: repeat(8, minmax(0, 1fr));
    gap: 12px;
    align-content:start;
  }

  .court{
    padding: 10px 10px 9px;
    min-height: 175px;
    position:relative;
    overflow:hidden;
  }

  .court::before{
    content:"";
    position:absolute;
    top:-40%;
    left:-20%;
    width:60%;
    height:120%;
    transform: rotate(18deg);
    background: radial-gradient(circle at 30% 40%, rgba(255,255,255,.18), transparent 55%);
    opacity:.30;
    pointer-events:none;
  }

  .court-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:8px;
    position:relative;
    z-index:1;
  }

  .court-title{
    display:flex;
    flex-direction:column;
    gap: 3px;
    min-width:0;
    flex:1 1 auto;
  }

  .court-title .title{
    font-weight:900;
    letter-spacing:-0.01em;
    font-size:14px;
    line-height:1.1;
  }

  .court-title .sub{
    font-weight:700;
    font-size:11.5px;
    color: rgba(255,255,255,.80);
  }

  .badge{
    font-size: 10.5px;
    font-weight: 800;
    padding: 5px 8px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.18);
    background: rgba(255,255,255,.10);
    color: rgba(255,255,255,.90);
    flex: 0 0 auto;
    white-space:nowrap;
  }

  .badge.live{ background: var(--ok); }
  .badge.empty{ opacity: .65; }

  .line{
    height:1px;
    background: rgba(255,255,255,.16);
    margin: 8px 0;
    position:relative;
    z-index:1;
  }

  .match{
    display:flex;
    flex-direction:column;
    gap: 6px;
    position:relative;
    z-index:1;
  }

  .teamrow{
    display:flex;
    justify-content:center;
    align-items:center;
    gap: 8px;
    padding: 8px 9px;
    border-radius: 12px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.12);
    text-align:center;
    min-width:0;
    overflow:hidden;
  }

  .team{
    font-size: 12.25px;
    font-weight: 750;
    min-width: 0;
    width:100%;
    line-height: 1.15;
    text-align:center;
  }

  .vs{
    font-size: 11px;
    color: var(--muted);
    font-weight: 800;
    text-align:center;
  }

  .timeinfo{
    margin-top: 8px;
    padding: 8px 9px;
    border-radius: 12px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.12);
    font-size: 11.25px;
    color: rgba(255,255,255,.78);
    line-height: 1.45;
    text-align:center;
    position:relative;
    z-index:1;
  }

  .timeinfo .fitline{
    display:block;
    width:100%;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:clip;
    line-height:1.35;
  }

  .empty .team,
  .empty .court-title .sub{
    color: rgba(255,255,255,.55);
    font-weight: 650;
  }

  @media (max-width: 1399px){
    .dashboard{
      grid-template-columns: 380px minmax(0, 1fr);
    }
    .courts-grid{
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
    .court{
      min-height: 185px;
    }
  }

  @media (max-width: 1050px){
    .dashboard{
      grid-template-columns: 1fr;
    }
    .sidebar{
      order:1;
    }
    .courts-grid{
      order:2;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 640px){
    body{ padding: 14px; }

    header{
      align-items:flex-start;
      flex-direction:column;
      gap:6px;
    }

    .statusline{
      justify-content:flex-start;
      text-align:left;
      gap:6px;
    }

    h1{ font-size: 24px; }

    .courts-grid{
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .court{
      min-height: 150px;
      padding: 12px;
    }

    .team{
      font-size: 13px;
    }

    .timeinfo{
      font-size: 12px;
    }

    .up-time{
      flex:0 0 98px;
    }
  }
</style>
</head>

<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>

  <div class="wrap">
    <header>
      <div class="titleblock">
        <h1>Indy Classic Court Assignments</h1>
        <div class="ts" id="sourceNote">Loading…</div>
      </div>
      <div class="statusline">
        <div class="ts">Auto-refresh: every 15 seconds</div>
        <div class="ts" id="lastRefreshStamp">Last refreshed: —</div>
      </div>
    </header>

    <section class="dashboard">
      <aside class="sidebar">
        <section class="panel lastmatch">
          <div class="panel-head">
            <h2>Last Match Placed</h2>
          </div>
          <div class="pillrow" id="lastPlacedRow">
            <div class="pill"><span class="fit"><b>Match:</b> —</span></div>
            <div class="pill"><span class="fit"><b>Scheduled:</b> —</span></div>
            <div class="pill"><span class="fit"><b>Actual:</b> —</span></div>
            <div class="pill"><span class="fit"><b>Court:</b> —</span></div>
          </div>
          <div class="err" id="errorMsg" hidden></div>
        </section>

        <section class="panel upcoming">
          <div class="panel-head">
            <h2>Next 5 Matches</h2>
          </div>
          <ul class="up-list" id="upcomingList"></ul>
        </section>
      </aside>

      <section class="courts-grid" id="courtsGrid" aria-label="Courts"></section>
    </section>
  </div>

<script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRrbxnR_sR21PWkZNhsqpzlnaQJ7AXhWmUN0aA_r9nXIxsdfQ6OnFsBEf9_aeVCIpZPIjhBAA5KraS_/pub?gid=0&single=true&output=csv";

  const NUM_COURTS = 16;
  const UPCOMING_COUNT = 5;
  const REFRESH_MS = 15000;

  const courtsGrid = document.getElementById('courtsGrid');
  const upList = document.getElementById('upcomingList');
  const errMsg = document.getElementById('errorMsg');
  const sourceNote = document.getElementById('sourceNote');
  const lastPlacedRow = document.getElementById('lastPlacedRow');
  const lastRefreshStamp = document.getElementById('lastRefreshStamp');

  let loading = false;
  let latestDataTimestamp = 0;

  function buildCourtShells(){
    courtsGrid.innerHTML = '';

    for(let i=1;i<=NUM_COURTS;i++){
      const card = document.createElement('article');
      card.className = 'panel court empty';
      card.dataset.court = i;
      card.innerHTML = `
        <div class="court-top">
          <div class="court-title">
            <div class="title">Court ${i}</div>
            <div class="sub fit" data-sub>—</div>
          </div>
          <div class="badge empty" data-badge>Empty</div>
        </div>

        <div class="line"></div>

        <div class="match">
          <div class="teamrow"><div class="team fit" data-team1>—</div></div>
          <div class="vs">vs</div>
          <div class="teamrow"><div class="team fit" data-team2>—</div></div>
        </div>

        <div class="timeinfo" data-times>
          <span class="fitline">Scheduled Time: —</span>
          <span class="fitline">Start Time: —</span>
          <span class="fitline">Duration: —</span>
        </div>
      `;
      courtsGrid.appendChild(card);
    }
  }

  const tidy = v => (v==null ? '' : String(v).trim());

  function isCourtEmpty(v){
    const t = tidy(v).toLowerCase();
    return !t || ['na','n/a','none','null','-','—','0'].includes(t);
  }

  function parseTimeToday(s){
    const str = tidy(s);
    if(!str) return null;

    let m = str.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?\s*([ap]m)$/i);
    if(m){
      let [, hh, mm, ss, ap] = m;
      let h = parseInt(hh,10);
      const min = parseInt(mm,10);
      const sec = ss ? parseInt(ss,10) : 0;
      ap = ap.toLowerCase();
      if(h === 12) h = 0;
      if(ap === 'pm') h += 12;
      const now = new Date();
      return new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, min, sec, 0);
    }

    m = str.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))$/);
    if(m || (m = str.match(/^(\d{1,2}):(\d{2})$/))){
      let [, hh, mm, ss] = m;
      const h = parseInt(hh,10);
      const min = parseInt(mm,10);
      const sec = ss ? parseInt(ss,10) : 0;
      if(h>=0 && h<24 && min>=0 && min<60 && sec>=0 && sec<60){
        const now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, min, sec, 0);
      }
    }

    const d = new Date(str);
    return isNaN(d.getTime()) ? null : d;
  }

  function toDateOrNullFlexible(v){
    const s = tidy(v);
    if(!s) return null;
    const d = new Date(s);
    if(!isNaN(d.getTime())) return d;
    return parseTimeToday(s);
  }

  function formatTime(dt){
    if(!dt) return '';
    let h = dt.getHours(), m = dt.getMinutes(), s = dt.getSeconds();
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12; if(h === 0) h = 12;
    const mm = m.toString().padStart(2,'0');
    const ss = s ? (':' + s.toString().padStart(2,'0')) : '';
    return `${h}:${mm}${ss} ${ampm}`;
  }

  function formatDateTime(dt){
    if(!dt) return '—';
    const date = dt.toLocaleDateString(undefined, {
      month: 'numeric',
      day: 'numeric',
      year: 'numeric'
    });
    return `${date} ${formatTime(dt)}`;
  }

  function formatDuration(since){
    if(!since) return '';
    const now = new Date();
    let diff = (now - since)/60000;
    if(diff < 1) return 'Just started';
    const hrs = Math.floor(diff/60);
    const mins = Math.floor(diff % 60);
    if(hrs > 0) return `${hrs} hr${hrs>1?'s':''} ${mins} min${mins!==1?'s':''}`;
    return `${mins} min${mins!==1?'s':''}`;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function setBadge(card, label, kind){
    const badge = card.querySelector('[data-badge]');
    badge.textContent = label;
    badge.classList.remove('live','empty');
    if(kind === 'live') badge.classList.add('live');
    if(kind === 'empty') badge.classList.add('empty');
  }

  function setLastPlaced(latestRow){
    const matchText = latestRow ? `${latestRow.team1 || '—'} vs ${latestRow.team2 || '—'}` : '—';
    const scheduled = formatTime(latestRow?.startTime) || '—';
    const actual = formatTime(latestRow?.time) || '—';
    const court = (latestRow?.court ?? '—');

    lastPlacedRow.innerHTML = `
      <div class="pill"><span class="fit"><b>Match:</b> ${escapeHtml(matchText)}</span></div>
      <div class="pill"><span class="fit"><b>Scheduled:</b> ${scheduled}</span></div>
      <div class="pill"><span class="fit"><b>Actual:</b> ${actual}</span></div>
      <div class="pill"><span class="fit"><b>Court:</b> ${court}</span></div>
    `;
  }

  function updateRefreshStamp(dt = new Date()){
    lastRefreshStamp.textContent = `Last refreshed: ${formatDateTime(dt)}`;
  }

  function measureTextWidth(el){
    return Math.ceil(el.scrollWidth);
  }

  function availableWidth(el){
    return Math.floor(el.clientWidth);
  }

  function shrinkTextToFit(el, minSize = 8, maxSize = null, reservePx = 6){
    if(!el) return;

    const computed = window.getComputedStyle(el);
    const startSize = maxSize || parseFloat(computed.fontSize) || 13;
    const targetWidth = Math.max(0, availableWidth(el) - reservePx);

    el.style.fontSize = startSize + 'px';

    if (measureTextWidth(el) <= targetWidth) return;

    let low = minSize;
    let high = startSize;
    let best = minSize;

    for(let i = 0; i < 20; i++){
      const mid = (low + high) / 2;
      el.style.fontSize = mid + 'px';

      if (measureTextWidth(el) <= targetWidth){
        best = mid;
        low = mid;
      } else {
        high = mid;
      }
    }

    el.style.fontSize = best + 'px';

    while (measureTextWidth(el) > targetWidth && parseFloat(el.style.fontSize) > minSize){
      el.style.fontSize = (parseFloat(el.style.fontSize) - 0.25) + 'px';
    }
  }

  function fitDynamicText(){
    document.querySelectorAll('#lastPlacedRow .fit').forEach(el => {
      shrinkTextToFit(el, 8.5, 12.5, 10);
    });

    document.querySelectorAll('.up-match').forEach(el => {
      shrinkTextToFit(el, 8.25, 13, 10);
    });

    document.querySelectorAll('.up-time .fit').forEach(el => {
      shrinkTextToFit(el, 9, 12.5, 8);
    });

    document.querySelectorAll('.court .sub.fit').forEach(el => {
      shrinkTextToFit(el, 8.25, 11.5, 12);
    });

    document.querySelectorAll('.court .team.fit').forEach(el => {
      shrinkTextToFit(el, 8.25, 12.25, 12);
    });

    document.querySelectorAll('.timeinfo .fitline').forEach(el => {
      shrinkTextToFit(el, 8, 11.25, 8);
    });
  }

  function renderFromRows(rows){
    buildCourtShells();

    const normalized = rows.map((r, idx) => {
      // Determine the most recent timestamp in this batch
      const batchMax = normalized.reduce((max, r) => {
      const t = (r.time ?? r.startTime)?.getTime() ?? 0;
      return t > max ? t : max;
      }, 0);

      // If this batch is older than what we already have, discard it
      if (batchMax > 0 && batchMax < latestDataTimestamp) {
      loading = false;
      return;
      }
      // Otherwise, accept it and update our watermark
      if (batchMax > 0) latestDataTimestamp = batchMax;
      const startRaw = tidy(r['Start Time']);
      const timeRaw  = tidy(r['Time']);
      const courtRaw = tidy(r['Court']) || tidy(r['Court #']);
      const team1    = tidy(r['Team 1']) || tidy(r['Team1']);
      const team2    = tidy(r['Team 2']) || tidy(r['Team2']);
      const event    = tidy(r['Event']);
      const round    = tidy(r['Round']);

      const num = parseInt(courtRaw, 10);
      const court = (!isCourtEmpty(courtRaw) && !isNaN(num)) ? num : null;

      const startTime = toDateOrNullFlexible(startRaw);
      const time = parseTimeToday(timeRaw) ?? null;

      return {
        _row: idx,
        startRaw, startTime,
        timeRaw, time,
        event, round, team1, team2,
        courtRaw, court
      };
    });

    const placedCandidates = normalized.filter(r => r.court != null && (r.time || r.startTime));
    let lastPlaced = null;
    for(const r of placedCandidates){
      const key = (r.time ?? r.startTime);
      const bestKey = lastPlaced ? (lastPlaced.time ?? lastPlaced.startTime) : null;
      if(!lastPlaced || key.getTime() > bestKey.getTime()) lastPlaced = r;
    }
    setLastPlaced(lastPlaced);

    const latestByCourt = new Map();
    for(const r of normalized){
      if(r.court==null) continue;
      const key = r.time ?? r.startTime ?? null;
      if(!key) continue;
      const prev = latestByCourt.get(r.court);
      const prevKey = prev ? (prev.time ?? prev.startTime) : null;
      if(!prev || key.getTime() > prevKey.getTime()){
        latestByCourt.set(r.court, r);
      }
    }

    for(const [num,row] of latestByCourt.entries()){
      const card = document.querySelector(`.court[data-court="${num}"]`);
      if(!card) continue;

      const sub = card.querySelector('[data-sub]');
      const t1 = card.querySelector('[data-team1]');
      const t2 = card.querySelector('[data-team2]');
      const times = card.querySelector('[data-times]');

      const subTxt = (row.event && row.round) ? `${row.event} — ${row.round}` : (row.event || row.round || '—');
      sub.textContent = subTxt;
      t1.textContent = row.team1 || '—';
      t2.textContent = row.team2 || '—';

      const sched = formatTime(row.startTime);
      const start = formatTime(row.time);
      const dur = formatDuration(row.time);

      times.innerHTML = `
        <span class="fitline">Scheduled: ${sched || '—'}</span>
        <span class="fitline">Started: ${start || '—'}</span>
        <span class="fitline">Duration: ${row.time ? (dur || '—') : '—'}</span>
      `;

      card.classList.remove('empty');
      setBadge(card, 'Live', 'live');
    }

    const upcoming = normalized
      .filter(r => r.court==null)
      .sort((a,b) => {
        const aKey = a.startTime ?? a.time ?? new Date(8640000000000000);
        const bKey = b.startTime ?? b.time ?? new Date(8640000000000000);
        return aKey - bKey;
      })
      .slice(0, UPCOMING_COUNT);

    upList.innerHTML = '';
    if(upcoming.length===0){
      const li=document.createElement('li');
      li.innerHTML = `
        <div class="up-left">
          <div class="up-match fit">No upcoming matches listed.</div>
        </div>
        <div class="pill up-time"><span class="fit">—</span></div>
      `;
      upList.appendChild(li);
    }else{
      for(const r of upcoming){
        const when = formatTime(r.startTime ?? r.time);
        const li=document.createElement('li');
        const matchText = `${r.team1 || '—'} vs ${r.team2 || '—'}`;
        li.innerHTML = `
          <div class="up-left">
            <div class="up-match fit">${escapeHtml(matchText)}</div>
          </div>
          <div class="pill up-time"><span class="fit">${when || 'Time TBD'}</span></div>
        `;
        upList.appendChild(li);
      }
    }

    requestAnimationFrame(() => {
      fitDynamicText();
    });
  }

  function loadCSV(){
    if(loading) return;
    loading = true;

    errMsg.hidden = true;
    sourceNote.textContent = 'Loading…';

    const url = CSV_URL + (CSV_URL.includes('?') ? '&' : '?') + 't=' + Date.now();

    Papa.parse(url, {
      download: true,
      header: true,
      skipEmptyLines: 'greedy',
      complete: (res) => {
        try{
          renderFromRows(res.data);
          updateRefreshStamp(new Date());
          sourceNote.textContent = '';
        }catch(e){
          errMsg.hidden = false;
          errMsg.textContent = 'Error rendering data: ' + e.message;
          sourceNote.textContent = '';
        } finally {
          loading = false;
        }
      },
      error: (e) => {
        errMsg.hidden = false;
        errMsg.textContent = 'CSV load failed: ' + e.message;
        sourceNote.textContent = '';
        loading = false;
      }
    });
  }

  let resizeTimer = null;
  function refitSoon(){
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      fitDynamicText();
    }, 40);
  }

  buildCourtShells();
  updateRefreshStamp(null);
  loadCSV();
  setInterval(loadCSV, REFRESH_MS);

  window.addEventListener('resize', refitSoon);
  window.addEventListener('load', refitSoon);

  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => {
      refitSoon();
    });
  }
</script>
</body>
</html>
