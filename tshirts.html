<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>T-Shirts – 2026 Indy Classic</title>

  <!-- Favicon: tennis ball emoji -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎾</text></svg>">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#1e293b;
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.70);
      --glass: rgba(255,255,255,.10);
      --glassBorder: rgba(255,255,255,.18);
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 20px;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    html, body { height: auto; min-height: 100%; }

    body{
      font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(99,102,241,.28), transparent 60%),
        radial-gradient(900px 600px at 85% 30%, rgba(34,197,94,.18), transparent 55%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .blob {
      position: fixed;
      width: 420px;
      height: 420px;
      border-radius: 999px;
      filter: blur(40px);
      opacity: .22;
      z-index: 0;
      pointer-events: none;
    }

    .blob.b1 { top: -140px; left: -140px; background: rgba(56,189,248,.9); }
    .blob.b2 { bottom: -180px; right: -140px; background: rgba(168,85,247,.9); }

    .container{
      width: min(860px, 100%);
      position: relative;
      z-index: 1;
      padding-bottom: 24px;
    }

    /* ── BACK LINK ── */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,.55);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 14px;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      transition: color .18s ease, background .18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .back-link:hover {
      color: rgba(255,255,255,.90);
      background: rgba(255,255,255,.12);
    }

    /* ── MAIN CARD ── */
    .card{
      background: var(--glass);
      border: 1px solid var(--glassBorder);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 30px 26px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      text-align: center;
    }

    /* ── LOGO ── */
    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .logo-box {
      width: min(100%, 240px);
      padding: 10px;
      border-radius: 18px;
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(255,255,255,.35);
      box-shadow: 0 14px 30px rgba(0,0,0,.30);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo {
      width: 100%;
      max-width: 220px;
      height: auto;
      display: block;
      object-fit: contain;
    }

    h1 {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── INFO NOTE ── */
    .info-note {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: rgba(186,230,255,.85);
      background: rgba(56,189,248,.10);
      border: 1px solid rgba(56,189,248,.22);
      border-radius: 999px;
      padding: 7px 14px;
      margin-bottom: 28px;
    }

    /* ── SHIRT GRID ── */
    .shirt-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .shirt-item {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 16px 16px 14px;
      transition: transform .22s ease, box-shadow .22s ease, border-color .22s ease;
      -webkit-tap-highlight-color: transparent;
    }

    @media (hover:hover) and (pointer:fine) {
      .shirt-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 44px rgba(0,0,0,.32);
        border-color: rgba(255,255,255,.22);
      }
    }

    .shirt-item:active {
      transform: scale(.99);
    }

    .shirt-item img {
      width: 100%;
      border-radius: 10px;
      object-fit: contain;
      aspect-ratio: 1 / 1;
      background: rgba(255,255,255,.04);
    }

    /* ── COLOR LABEL ── */
    .shirt-label {
      margin-top: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .color-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,.25);
    }

    .shirt-title {
      font-weight: 700;
      font-size: 14px;
      letter-spacing: .04em;
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 28px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,.08);
      font-size: 12.5px;
      color: rgba(255,255,255,.40);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .shirt-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
      }
    }

    @media (max-width: 400px) {
      body { padding: 16px; }
      .card { padding: 22px 16px; }
      h1 { font-size: 24px; }
      .shirt-grid { gap: 12px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .shirt-item, .back-link { transition: none; }
      .shirt-item:active { transform: none; }
    }
  </style>
</head>
<body>

  <div class="blob b1"></div>
  <div class="blob b2"></div>

  <div class="container">

    <a href="index.html" class="back-link">← Home</a>

    <div class="card">

      <div class="logo-wrap">
        <div class="logo-box">
          <img src="profile.jpg.png" alt="2026 Indy Classic Logo" class="logo">
        </div>
      </div>

      <h1>2026 Indy Classic T-Shirts</h1>
      <div class="subtitle">Choose your style for this year's event</div>

      <div class="info-note">
        👕 Shirts are included with registration &mdash; choose your color when signing up
      </div>

      <div class="shirt-grid">

        <div class="shirt-item">
          <img src="shirt1.jpg" alt="Black T-Shirt">
          <div class="shirt-label">
            <span class="color-dot" style="background:#1a1a1a;"></span>
            <span class="shirt-title">Black</span>
          </div>
        </div>

        <div class="shirt-item">
          <img src="shirt2.jpg" alt="Aqua T-Shirt">
          <div class="shirt-label">
            <span class="color-dot" style="background:#22d3ee;"></span>
            <span class="shirt-title">Aqua</span>
          </div>
        </div>

        <div class="shirt-item">
          <img src="shirt3.jpg" alt="Cardinal T-Shirt">
          <div class="shirt-label">
            <span class="color-dot" style="background:#9f1239;"></span>
            <span class="shirt-title">Cardinal</span>
          </div>
        </div>

      </div>

      <footer>© 2026 Indy Classic</footer>

    </div>
  </div>

</body>
</html>
