<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Indy Classic — Courts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg1:         #0f172a;
    --bg2:         #1e293b;
    --glass:       rgba(255,255,255,.10);
    --glassBorder: rgba(255,255,255,.18);
    --glassDark:   rgba(255,255,255,.06);
    --text:        rgba(255,255,255,.92);
    --muted:       rgba(255,255,255,.62);
    --muted2:      rgba(255,255,255,.38);
    --shadow:      0 18px 50px rgba(0,0,0,.40);
    --radius:      14px;
    --accent:      rgba(99,102,241,1);
    --green:       rgba(34,197,94,1);
    --green-dim:   rgba(34,197,94,.22);
    --green-glow:  rgba(34,197,94,.45);
    --amber:       rgba(251,191,36,1);
    --amber-dim:   rgba(251,191,36,.20);
    --red:         rgba(244,63,94,1);
    --red-dim:     rgba(244,63,94,.22);
    --live-border: rgba(34,197,94,.55);
    --live-bg:     rgba(34,197,94,.07);
    --live-shadow: 0 0 0 1px rgba(34,197,94,.5), 0 0 28px rgba(34,197,94,.18), 0 8px 32px rgba(0,0,0,.5);
    --hot-border:  rgba(251,191,36,.65);
    --hot-bg:      rgba(251,191,36,.07);
    --hot-shadow:  0 0 0 1px rgba(251,191,36,.5), 0 0 28px rgba(251,191,36,.18), 0 8px 32px rgba(0,0,0,.5);
    font-family: 'Barlow', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background:
      radial-gradient(1200px 700px at 20% 10%, rgba(99,102,241,.28), transparent 60%),
      radial-gradient(900px 600px at 85% 30%, rgba(34,197,94,.16), transparent 55%),
      linear-gradient(135deg, var(--bg1), var(--bg2));
    color: var(--text);
  }

  .blob {
    position: fixed; border-radius:999px;
    filter:blur(50px); opacity:.20; z-index:0; pointer-events:none;
  }
  .blob.b1 { width:440px;height:440px;top:-160px;left:-160px;background:rgba(56,189,248,.9); }
  .blob.b2 { width:440px;height:440px;bottom:-180px;right:-160px;background:rgba(168,85,247,.9); }

  /* ══════════════════════════════════════
     TV LAYOUT  (>= 900px)
  ══════════════════════════════════════ */
  .tv-wrap {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Header ── */
  .tv-header {
    flex: 0 0 62px;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 24px;
    background:rgba(15,23,42,.55);
    backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border-bottom:1px solid var(--glassBorder);
    position:relative; z-index:10;
  }

  .hd-left  { display:flex; align-items:baseline; gap:14px; }
  .hd-title {
    font-family:'Barlow Condensed',sans-serif;
    font-size:26px; font-weight:900;
    letter-spacing:.05em; text-transform:uppercase;
  }
  .hd-subtitle {
    font-family:'Barlow Condensed',sans-serif;
    font-size:14px; font-weight:700;
    letter-spacing:.14em; text-transform:uppercase; color:var(--muted);
  }
  .hd-center { display:flex; align-items:center; gap:18px; }
  .hd-live {
    display:flex; align-items:center; gap:7px;
    font-family:'Barlow Condensed',sans-serif;
    font-size:12px; font-weight:800;
    letter-spacing:.14em; text-transform:uppercase; color:var(--green);
  }
  .hd-live-dot {
    width:8px; height:8px; border-radius:50%;
    background:var(--green); box-shadow:0 0 8px var(--green-glow);
    animation:pulse-dot 2s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100%{ opacity:1; box-shadow:0 0 6px var(--green-glow); }
    50%    { opacity:.5; box-shadow:0 0 16px var(--green-glow); }
  }
  .hd-refresh { font-size:11px; color:var(--muted2); }
  .hd-right { display:flex; flex-direction:column; align-items:flex-end; gap:1px; }
  .hd-clock {
    font-family:'Barlow Condensed',sans-serif;
    font-size:32px; font-weight:800; letter-spacing:.04em; line-height:1;
  }
  .hd-date {
    font-size:10px; font-weight:500; color:var(--muted);
    letter-spacing:.08em; text-transform:uppercase;
  }

  /* ── Error bar ── */
  .err-bar {
    position:fixed; top:62px; left:0; right:0;
    background:var(--red-dim); border-bottom:1px solid rgba(244,63,94,.4);
    color:var(--red); font-size:12px; font-weight:600;
    padding:6px 24px; z-index:20; display:none;
  }
  .err-bar.show { display:block; }

  /* ── Main ── */
  .tv-main {
    flex:1 1 0; min-height:0;
    padding:12px 16px 10px;
    position:relative; z-index:1; overflow:hidden;
  }

  /* ── Courts grid 4×4 ── */
  .courts-grid {
    height:100%;
    display:grid;
    grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);
    gap:10px;
  }

  /* ── Court card ── */
  .court {
    background:var(--glass);
    border:1px solid var(--glassBorder);
    border-radius:var(--radius);
    padding:9px 12px 8px;
    display:flex; flex-direction:column;
    position:relative; overflow:hidden;
    box-shadow:var(--shadow);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    transition:border-color .3s, box-shadow .3s, background .3s;
  }
  .court::after {
    content:''; position:absolute; top:-40%; left:-20%;
    width:60%; height:120%; transform:rotate(18deg);
    background:radial-gradient(circle at 30% 40%,rgba(255,255,255,.14),transparent 55%);
    opacity:.28; pointer-events:none;
  }
  .court.live { background:var(--live-bg); border-color:var(--live-border); box-shadow:var(--live-shadow); }
  .court.hot  { background:var(--hot-bg);  border-color:var(--hot-border);  box-shadow:var(--hot-shadow);  }

  /* ── Court top row ── */
  .court-top {
    display:flex; align-items:center; justify-content:space-between; gap:5px;
    margin-bottom:5px; position:relative; z-index:1;
  }
  .court-num {
    font-family:'Barlow Condensed',sans-serif;
    font-size:12px; font-weight:800;
    letter-spacing:.12em; text-transform:uppercase; color:var(--muted); flex-shrink:0;
  }
  .court-event {
    font-size:9.5px; font-weight:600; color:var(--muted2);
    letter-spacing:.04em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    flex:1 1 0; min-width:0; text-align:center;
  }
  .court-badge {
    font-family:'Barlow Condensed',sans-serif;
    font-size:9.5px; font-weight:800; letter-spacing:.12em; text-transform:uppercase;
    padding:2px 7px; border-radius:4px;
    border:1px solid var(--glassBorder); background:var(--glassDark); color:var(--muted);
    flex-shrink:0;
  }
  .court-badge.live {
    background:var(--green-dim); border-color:rgba(34,197,94,.4); color:var(--green);
    animation:badge-pulse 2.5s ease-in-out infinite;
  }
  .court-badge.hot {
    background:var(--amber-dim); border-color:rgba(251,191,36,.4); color:var(--amber);
    animation:badge-pulse 2s ease-in-out infinite;
  }
  @keyframes badge-pulse { 0%,100%{ opacity:1; } 50%{ opacity:.5; } }

  .court-divider { height:1px; background:rgba(255,255,255,.12); margin:0 0 5px; position:relative; z-index:1; }

  /* ── Players area ── */
  .court-players {
    flex:1 1 0; display:flex; flex-direction:column; justify-content:center;
    gap:2px; position:relative; z-index:1; min-height:0;
  }
  .player-row { display:flex; align-items:center; gap:6px; min-width:0; }
  .player-dot {
    width:5px; height:5px; border-radius:50%; flex-shrink:0;
    background:rgba(255,255,255,.22); transition:background .3s;
  }
  .court.live .player-dot { background:var(--green); box-shadow:0 0 5px var(--green-glow); }
  .court.hot  .player-dot { background:var(--amber); box-shadow:0 0 5px rgba(251,191,36,.5); }

  .player-name {
    font-family:'Barlow Condensed',sans-serif; font-weight:700;
    font-size:clamp(12px,1.2vw,19px); letter-spacing:.01em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    min-width:0; flex:1; line-height:1.2; color:var(--muted); transition:color .3s;
  }
  .court.live .player-name,
  .court.hot  .player-name { color:var(--text); }

  /* Doubles stacked */
  .player-name-stack { display:flex; flex-direction:column; gap:0; min-width:0; flex:1; }
  .pname {
    font-family:'Barlow Condensed',sans-serif; font-weight:700;
    font-size:clamp(10px,1vw,16px); letter-spacing:.01em;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    line-height:1.2; color:var(--muted); transition:color .3s;
  }
  .court.live .pname,
  .court.hot  .pname { color:var(--text); }

  .vs-divider { display:flex; align-items:center; gap:5px; padding:1px 0; position:relative; z-index:1; }
  .vs-line    { flex:1; height:1px; background:rgba(255,255,255,.10); }
  .vs-label   {
    font-family:'Barlow Condensed',sans-serif;
    font-size:9px; font-weight:800; letter-spacing:.18em; color:var(--muted2); text-transform:uppercase;
  }

  /* ── Duration chip — bottom right of card ── */
  .court-dur {
    margin-top:5px; flex-shrink:0;
    display:flex; justify-content:flex-end;
    position:relative; z-index:1;
  }
  .dur-chip {
    display:inline-flex; align-items:center; gap:4px;
    padding:3px 8px; border-radius:6px;
    background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.10);
    font-family:'Barlow Condensed',sans-serif;
    font-size:clamp(9px,.85vw,12px); font-weight:700;
  }
  .dur-chip .dur-label {
    font-size:7.5px; font-weight:800; letter-spacing:.12em;
    text-transform:uppercase; color:var(--muted2);
  }
  .dur-chip .dur-val { color:var(--green); }
  .court.hot .dur-chip .dur-val { color:var(--amber); }
  .court.empty .dur-chip { opacity:.25; }

  /* ── Footer ── */
  .tv-footer {
    flex:0 0 52px; min-height:52px; max-height:52px;
    background:rgba(15,23,42,.65);
    backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--glassBorder);
    display:flex; align-items:stretch;
    position:relative; z-index:10; overflow:hidden;
  }
  .footer-section {
    display:flex; align-items:center; padding:0 16px; gap:8px; flex-shrink:0;
    border-right:1px solid rgba(255,255,255,.10);
  }
  .footer-label {
    font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:800;
    letter-spacing:.15em; text-transform:uppercase; color:var(--accent); opacity:.8; white-space:nowrap;
  }
  .footer-value {
    font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700;
    color:var(--text); white-space:nowrap; max-width:240px; overflow:hidden; text-overflow:ellipsis;
  }
  .footer-meta {
    font-size:10px; color:var(--muted); white-space:nowrap;
    max-width:240px; overflow:hidden; text-overflow:ellipsis;
  }

  /* Ticker */
  .footer-upcoming {
    flex:1 1 0; min-width:0; display:flex; align-items:center;
    padding:0 12px; gap:10px; overflow:hidden;
  }
  .upcoming-label {
    font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:800;
    letter-spacing:.15em; text-transform:uppercase; color:var(--amber); opacity:.85;
    white-space:nowrap; flex-shrink:0;
  }
  .upcoming-track {
    flex:1 1 0; min-width:0; overflow:hidden;
    position:relative; height:100%; display:flex; align-items:center;
  }
  .upcoming-track::before,
  .upcoming-track::after {
    content:''; position:absolute; top:0; bottom:0; width:28px; z-index:2; pointer-events:none;
  }
  .upcoming-track::before { left:0;  background:linear-gradient(90deg, rgba(15,23,42,.75),transparent); }
  .upcoming-track::after  { right:0; background:linear-gradient(270deg,rgba(15,23,42,.75),transparent); }
  .upcoming-inner {
    display:flex; align-items:center; white-space:nowrap;
    animation:ticker 40s linear infinite; will-change:transform;
  }
  .upcoming-inner:hover { animation-play-state:paused; }
  @keyframes ticker { 0%{ transform:translateX(0); } 100%{ transform:translateX(-50%); } }
  .upcoming-match {
    display:inline-flex; align-items:center; gap:7px; padding:0 18px;
    border-right:1px solid rgba(255,255,255,.12);
  }
  .upcoming-num {
    font-family:'Barlow Condensed',sans-serif; font-size:10px; font-weight:900;
    background:rgba(251,191,36,.18); border:1px solid rgba(251,191,36,.35);
    color:var(--amber); border-radius:4px; padding:1px 5px; letter-spacing:.05em; flex-shrink:0;
  }
  .upcoming-teams {
    font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; color:var(--text);
  }
  .upcoming-time {
    font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:600; color:var(--amber); opacity:.85;
  }
  .footer-right {
    flex-shrink:0; display:flex; align-items:center; padding:0 14px;
    border-left:1px solid rgba(255,255,255,.10);
  }
  .footer-right .footer-meta { text-align:right; }


  /* ══════════════════════════════════════
     MOBILE LAYOUT  (< 900px)
  ══════════════════════════════════════ */
  .mob-wrap { display:none; flex-direction:column; min-height:100vh; }

  .mob-header {
    position:sticky; top:0; z-index:20;
    background:rgba(15,23,42,.75);
    backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    border-bottom:1px solid var(--glassBorder);
    padding:10px 16px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .mob-title {
    font-family:'Barlow Condensed',sans-serif;
    font-size:20px; font-weight:900; letter-spacing:.05em; text-transform:uppercase;
  }
  .mob-clock {
    font-family:'Barlow Condensed',sans-serif;
    font-size:18px; font-weight:800; color:var(--text);
  }
  .mob-live {
    display:flex; align-items:center; gap:6px;
    font-family:'Barlow Condensed',sans-serif;
    font-size:11px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--green);
  }
  .mob-refresh { font-size:10px; color:var(--muted2); }

  .mob-main { flex:1; padding:10px 12px 16px; }

  /* Section labels */
  .mob-section-label {
    font-family:'Barlow Condensed',sans-serif;
    font-size:10px; font-weight:800; letter-spacing:.16em; text-transform:uppercase;
    color:var(--muted2); padding:12px 0 6px;
    display:flex; align-items:center; gap:8px;
  }
  .mob-section-label::after { content:''; flex:1; height:1px; background:rgba(255,255,255,.08); }

  /* Last placed card on mobile */
  .mob-last-placed {
    background: rgba(99,102,241,.12);
    border: 1px solid rgba(99,102,241,.40);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 0 0 1px rgba(99,102,241,.3), 0 4px 20px rgba(0,0,0,.35);
  }
  .mob-last-top {
    display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:6px;
  }
  .mob-last-label {
    font-family:'Barlow Condensed',sans-serif;
    font-size:9px; font-weight:800; letter-spacing:.15em; text-transform:uppercase;
    color:var(--accent); opacity:.9;
  }
  .mob-last-court {
    font-family:'Barlow Condensed',sans-serif;
    font-size:11px; font-weight:900; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
  }
  .mob-last-time {
    font-family:'Barlow Condensed',sans-serif;
    font-size:11px; font-weight:700; color:var(--muted2);
  }
  .mob-last-teams {
    font-family:'Barlow Condensed',sans-serif;
    font-size:16px; font-weight:700; color:var(--text);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .mob-last-meta {
    font-size:11px; color:var(--muted); margin-top:2px;
  }

  /* Live court cards on mobile */
  .mob-court {
    background:var(--glass);
    border:1px solid var(--glassBorder);
    border-radius:12px; padding:12px 14px;
    margin-bottom:8px;
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    box-shadow:0 4px 20px rgba(0,0,0,.35);
    transition:border-color .3s, background .3s;
  }
  .mob-court.live { background:var(--live-bg); border-color:var(--live-border); }
  .mob-court.hot  { background:var(--hot-bg);  border-color:var(--hot-border);  }

  .mob-court-top {
    display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px;
  }
  .mob-court-num {
    font-family:'Barlow Condensed',sans-serif;
    font-size:11px; font-weight:900; letter-spacing:.12em; text-transform:uppercase; color:var(--muted);
  }
  .mob-court-event {
    font-size:10px; color:var(--muted2); font-weight:600;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; text-align:center;
  }
  .mob-badge {
    font-family:'Barlow Condensed',sans-serif;
    font-size:9px; font-weight:800; letter-spacing:.12em; text-transform:uppercase;
    padding:2px 7px; border-radius:4px;
    border:1px solid var(--glassBorder); background:var(--glassDark); color:var(--muted);
  }
  .mob-badge.live { background:var(--green-dim); border-color:rgba(34,197,94,.4); color:var(--green); }
  .mob-badge.hot  { background:var(--amber-dim); border-color:rgba(251,191,36,.4); color:var(--amber); }

  /* Player names on mobile */
  .mob-players { margin-bottom:8px; }
  .mob-player-row { display:flex; align-items:center; gap:8px; padding:2px 0; }
  .mob-player-dot {
    width:6px; height:6px; border-radius:50%; flex-shrink:0;
    background:rgba(255,255,255,.22);
  }
  .mob-court.live .mob-player-dot { background:var(--green); }
  .mob-court.hot  .mob-player-dot { background:var(--amber); }

  .mob-player-name {
    font-family:'Barlow Condensed',sans-serif;
    font-size:16px; font-weight:700;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    color:var(--text); line-height:1.2;
  }
  .mob-player-name-stack { display:flex; flex-direction:column; gap:0; min-width:0; flex:1; }
  .mob-pname {
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:14px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    color:var(--text); line-height:1.25;
  }

  .mob-vs {
    font-family:'Barlow Condensed',sans-serif; font-size:9px; font-weight:800;
    letter-spacing:.18em; color:var(--muted2); text-transform:uppercase;
    text-align:center; padding:1px 0;
  }

  .mob-dur {
    display:flex; justify-content:flex-end; margin-top:4px;
  }
  .mob-dur-chip {
    display:inline-flex; align-items:center; gap:5px;
    padding:3px 9px; border-radius:6px;
    background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.10);
    font-family:'Barlow Condensed',sans-serif; font-size:12px; font-weight:700;
  }
  .mob-dur-chip .dlabel {
    font-size:8px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:var(--muted2);
  }
  .mob-dur-chip .dval { color:var(--green); }
  .mob-court.hot .mob-dur-chip .dval { color:var(--amber); }

  /* Upcoming on mobile */
  .mob-upcoming { display:flex; flex-direction:column; gap:6px; }
  .mob-up-item {
    background:var(--glassDark); border:1px solid rgba(255,255,255,.10);
    border-radius:10px; padding:10px 12px;
    display:flex; align-items:center; gap:10px;
  }
  .mob-up-num {
    font-family:'Barlow Condensed',sans-serif; font-size:11px; font-weight:900;
    background:rgba(251,191,36,.18); border:1px solid rgba(251,191,36,.35);
    color:var(--amber); border-radius:4px; padding:2px 7px;
    flex-shrink:0;
  }
  .mob-up-body { flex:1; min-width:0; }
  .mob-up-teams {
    font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700;
    color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .mob-up-meta { font-size:11px; color:var(--muted); margin-top:1px; }
  .mob-up-time {
    font-family:'Barlow Condensed',sans-serif; font-size:13px; font-weight:700;
    color:var(--amber); flex-shrink:0;
  }

  /* ── Responsive switch ── */
  @media (max-width: 899px) {
    html, body { overflow:auto; height:auto; min-height:100vh; }
    .tv-wrap  { display:none; }
    .mob-wrap { display:flex; }
  }
  @media (min-width: 900px) {
    html, body { overflow:hidden; height:100%; }
    .tv-wrap  { display:flex; }
    .mob-wrap { display:none; }
  }
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>

<!-- ══════════════════════════
     TV LAYOUT
══════════════════════════ -->
<div class="tv-wrap">
  <header class="tv-header">
    <div class="hd-left">
      <span class="hd-title">Indy Classic</span>
      <span class="hd-subtitle">Court Assignments</span>
    </div>
    <div class="hd-center">
      <div class="hd-live"><div class="hd-live-dot"></div>Live</div>
      <div class="hd-refresh" id="tvRefresh">—</div>
    </div>
    <div class="hd-right">
      <div class="hd-clock" id="tvClock">--:--</div>
      <div class="hd-date"  id="tvDate">—</div>
    </div>
  </header>

  <div class="err-bar" id="errorBar"></div>

  <main class="tv-main">
    <div class="courts-grid" id="courtsGrid" aria-label="Courts"></div>
  </main>

  <footer class="tv-footer">
    <div class="footer-section">
      <div>
        <div class="footer-label">Last Placed</div>
        <div class="footer-value" id="tvLastName">—</div>
        <div class="footer-meta"  id="tvLastMeta">—</div>
      </div>
    </div>
    <div class="footer-upcoming">
      <div class="upcoming-label">Up Next</div>
      <div class="upcoming-track">
        <div class="upcoming-inner" id="tvTicker">
          <div class="upcoming-match"><span class="upcoming-teams">Loading…</span></div>
        </div>
      </div>
    </div>
    <div class="footer-right">
      <div class="footer-meta">Auto-refresh<br>every 30 sec</div>
    </div>
  </footer>
</div>

<!-- ══════════════════════════
     MOBILE LAYOUT
══════════════════════════ -->
<div class="mob-wrap">
  <header class="mob-header">
    <div>
      <div class="mob-title">Indy Classic</div>
      <div class="mob-refresh" id="mobRefresh">—</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="mob-live"><div class="hd-live-dot"></div>Live</div>
      <div class="mob-clock" id="mobClock">--:--</div>
    </div>
  </header>

  <main class="mob-main" id="mobMain">
    <div style="text-align:center;padding:30px;color:var(--muted);">Loading…</div>
  </main>
</div>

<script>
  /* ═══════════════════════════════
     CONFIG
  ═══════════════════════════════ */
  const JSON_URL       = "https://script.google.com/macros/s/AKfycbwv9yiFvW1VBrY_iL9T5ZvhUH_2ygptxukgt8dj5ZaEFSw63fQopzcAfIwETaTx5WJ7/exec";
  const NUM_COURTS     = 16;
  const UPCOMING_COUNT = 5;
  const REFRESH_MS     = 30000;
  const HOT_MINUTES    = 120;

  /* ═══════════════════════════════
     DOM
  ═══════════════════════════════ */
  const courtsGrid = document.getElementById('courtsGrid');
  const errorBar   = document.getElementById('errorBar');
  const tvTicker   = document.getElementById('tvTicker');
  const tvLastName = document.getElementById('tvLastName');
  const tvLastMeta = document.getElementById('tvLastMeta');
  const tvClock    = document.getElementById('tvClock');
  const tvDate     = document.getElementById('tvDate');
  const tvRefresh  = document.getElementById('tvRefresh');
  const mobMain    = document.getElementById('mobMain');
  const mobClock   = document.getElementById('mobClock');
  const mobRefresh = document.getElementById('mobRefresh');

  let loading = false;

  /* ═══════════════════════════════
     CLOCK
  ═══════════════════════════════ */
  function fmtClock(d){
    let h=d.getHours(); const m=d.getMinutes();
    const ap=h>=12?'PM':'AM'; h=h%12||12;
    return `${h}:${String(m).padStart(2,'0')} ${ap}`;
  }
  function tickClock(){
    const now=new Date();
    const t=fmtClock(now);
    tvClock.textContent=t; mobClock.textContent=t;
    tvDate.textContent=now.toLocaleDateString(undefined,{
      weekday:'long',month:'long',day:'numeric',year:'numeric'
    });
  }
  tickClock(); setInterval(tickClock,10000);

  /* Duration live-tick + hot upgrade */
  setInterval(()=>{
    document.querySelectorAll('.dur-val[data-started], .dval[data-started]').forEach(el=>{
      el.textContent=formatDuration(new Date(el.dataset.started));
    });
    /* TV hot upgrade */
    document.querySelectorAll('.court.live').forEach(card=>{
      const d=card.querySelector('.dur-val[data-started]'); if(!d) return;
      if((new Date()-new Date(d.dataset.started))/60000>=HOT_MINUTES){
        card.classList.remove('live'); card.classList.add('hot');
        const b=card.querySelector('[data-badge]');
        if(b){b.textContent='2h+ 🔥';b.className='court-badge hot';}
      }
    });
    /* Mobile hot upgrade */
    document.querySelectorAll('.mob-court.live').forEach(card=>{
      const d=card.querySelector('.dval[data-started]'); if(!d) return;
      if((new Date()-new Date(d.dataset.started))/60000>=HOT_MINUTES){
        card.classList.remove('live'); card.classList.add('hot');
        const b=card.querySelector('.mob-badge');
        if(b){b.textContent='2h+ 🔥';b.className='mob-badge hot';}
      }
    });
  },60000);

  /* ═══════════════════════════════
     NAME HELPERS
  ═══════════════════════════════ */
  function abbrevName(n){
    const parts=String(n||'').trim().split(/\s+/);
    if(!parts[0]) return n;
    return parts[0][0].toUpperCase()+'. '+parts.slice(1).join(' ');
  }

  function parseTeams(rawT1,rawT2){
    const t1=String(rawT1||'').trim(), t2=String(rawT2||'').trim();
    const p1=t1?t1.split('+').map(s=>s.trim()).filter(Boolean):[];
    const p2=t2?t2.split('+').map(s=>s.trim()).filter(Boolean):[];
    const total=p1.length+p2.length;
    if(total<=2) return {t1d:p1.map(abbrevName).join(' / '),t2d:p2.map(abbrevName).join(' / '),dbl:false};
    if(p1.length===4&&p2.length===0) return {
      t1d:[p1[0],p1[1]].map(abbrevName).join(' / '),
      t2d:[p1[2],p1[3]].map(abbrevName).join(' / '),dbl:true
    };
    if(p1.length>=2&&p2.length>=2) return {t1d:p1.map(abbrevName).join(' / '),t2d:p2.map(abbrevName).join(' / '),dbl:true};
    const all=[...p1,...p2]; const half=Math.ceil(all.length/2);
    return {t1d:all.slice(0,half).map(abbrevName).join(' / '),t2d:all.slice(half).map(abbrevName).join(' / '),dbl:true};
  }

  /* ═══════════════════════════════
     UTILS
  ═══════════════════════════════ */
  const tidy=v=>(v==null?'':String(v).trim());

  function esc(s){
    return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function isCourtEmpty(v){
    const t=tidy(v).toLowerCase();
    return !t||['na','n/a','none','null','-','—','0'].includes(t);
  }

  /* ─────────────────────────────────────────────────────────────
     parseStartTime: handles "Saturday 4/25/2026 8:00 AM" style
     strings that may come from the Start Time column.
  ───────────────────────────────────────────────────────────── */
  function parseStartTime(s){
    const str=tidy(s); if(!str) return null;
    const d=new Date(str); if(!isNaN(d.getTime())) return d;
    return null;
  }

  /* ─────────────────────────────────────────────────────────────
     parseTimeColumn: parses the "Time" column.
     The Time column contains the wall-clock time when the match
     actually started, stored as HH:MM:SS (24-hour) or H:MM:SS or
     similar time-of-day strings (e.g. "9:56:56", "14:03:00").
     We interpret it as today's date at that clock time so that
     "now minus time" gives the correct elapsed duration.

     Also handles Google Sheets serial numbers and 12-hour format
     just in case.
  ───────────────────────────────────────────────────────────── */
 function parseTimeColumn(s){
    const str=tidy(s); if(!str) return null;
    console.log('TIME RAW VALUE:', JSON.stringify(s), typeof s);

    const numVal = Number(str);
    if(!isNaN(numVal) && numVal >= 0 && numVal < 1){
      const n = new Date();
      const midnight = new Date(n.getFullYear(), n.getMonth(), n.getDate(), 0, 0, 0, 0);
      return new Date(midnight.getTime() + Math.round(numVal * 86400000));
    }
    

    // Google Sheets full date serial (5-digit integer or decimal like 46000.375)
    if(/^\d{5}(\.\d+)?$/.test(str)){
      const days=Number(str);
      const base=new Date(Date.UTC(1899,11,30));
      return new Date(base.getTime()+days*86400000);
    }

    // 24-hour with seconds: "9:56:56" or "14:03:00"
    let m=str.match(/^(\d{1,2}):(\d{2}):(\d{2})(\.\d+)?$/);
    if(m){
      const h=parseInt(m[1],10), min=parseInt(m[2],10), sec=parseInt(m[3],10);
      if(h>=0&&h<24&&min>=0&&min<60&&sec>=0&&sec<60){
        const n=new Date();
        return new Date(n.getFullYear(),n.getMonth(),n.getDate(),h,min,sec,0);
      }
    }

    // 24-hour without seconds: "9:56" or "14:03"
    m=str.match(/^(\d{1,2}):(\d{2})$/);
    if(m){
      const h=parseInt(m[1],10), min=parseInt(m[2],10);
      if(h>=0&&h<24&&min>=0&&min<60){
        const n=new Date();
        return new Date(n.getFullYear(),n.getMonth(),n.getDate(),h,min,0,0);
      }
    }

    // 12-hour: "9:56:56 AM" or "9:56 AM"
    m=str.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?\s*([ap]m)$/i);
    if(m){
      let h=parseInt(m[1],10);
      const min=parseInt(m[2],10), sec=m[3]?parseInt(m[3],10):0;
      const ap=m[4].toLowerCase();
      if(h===12) h=0; if(ap==='pm') h+=12;
      const n=new Date();
      return new Date(n.getFullYear(),n.getMonth(),n.getDate(),h,min,sec,0);
    }

    // ISO / other fallback
    const d=new Date(str); return isNaN(d.getTime())?null:d;
  }

  function formatTime(dt){
    if(!dt) return '—';
    return fmtClock(dt);
  }

  function formatDuration(since){
    if(!since) return '—';
    const diff=(new Date()-since)/60000;
    if(diff<1) return 'Just started';
    const hrs=Math.floor(diff/60),mins=Math.floor(diff%60);
    if(hrs>0) return `${hrs}h ${mins}m`;
    return `${mins} min`;
  }

  /* ═══════════════════════════════
     TV — BUILD COURT SHELLS
  ═══════════════════════════════ */
  function buildCourtShells(){
    courtsGrid.innerHTML='';
    for(let i=1;i<=NUM_COURTS;i++){
      const card=document.createElement('article');
      card.className='court empty'; card.dataset.court=i;
      card.innerHTML=`
        <div class="court-top">
          <div class="court-num">Court ${i}</div>
          <div class="court-event" data-event></div>
          <div class="court-badge" data-badge>Empty</div>
        </div>
        <div class="court-divider"></div>
        <div class="court-players">
          <div class="player-row">
            <div class="player-dot"></div>
            <div class="player-name" data-team1>—</div>
          </div>
          <div class="vs-divider">
            <div class="vs-line"></div><div class="vs-label">VS</div><div class="vs-line"></div>
          </div>
          <div class="player-row">
            <div class="player-dot"></div>
            <div class="player-name" data-team2>—</div>
          </div>
        </div>
        <div class="court-dur">
          <div class="dur-chip">
            <span class="dur-label">Duration</span>
            <span class="dur-val" data-dur>—</span>
          </div>
        </div>`;
      courtsGrid.appendChild(card);
    }
  }

  function setPlayerCell(el,displayText,isDoubles){
    if(!isDoubles||!displayText.includes(' / ')){
      el.className='player-name'; el.textContent=displayText||'—'; return;
    }
    const names=displayText.split(' / ');
    el.className='player-name-stack';
    el.innerHTML=names.map(n=>`<span class="pname">${esc(n)}</span>`).join('');
  }

  /* ═══════════════════════════════
     RENDER — shared data processing
  ═══════════════════════════════ */
  function processRows(rows){
    return rows.map((r,idx)=>{
      const startRaw  = tidy(r['Start Time']);
      const timeRaw   = tidy(r['Time']);
      const courtRaw  = tidy(r['Court'])||tidy(r['Court #']);
      const rawT1     = tidy(r['Team 1'])||tidy(r['Team1']);
      const rawT2     = tidy(r['Team 2'])||tidy(r['Team2']);
      const event     = tidy(r['Event']);
      const round     = tidy(r['Round']);

      const num   = parseInt(courtRaw,10);
      const court = (!isCourtEmpty(courtRaw)&&!isNaN(num))?num:null;

      // startTime: scheduled time from "Start Time" column
      const startTime = parseStartTime(startRaw);

      // time: actual wall-clock start time from "Time" column (HH:MM:SS today)
      // A non-empty Time value means the match has been placed on a court.
      const time = parseTimeColumn(timeRaw) || null;

      // hasTime: true if the Time column had a real value
      const hasTime = !!timeRaw;

      const {t1d,t2d,dbl} = parseTeams(rawT1,rawT2);

      return {_row:idx, startTime, time, hasTime, event, round, rawT1, rawT2, t1d, t2d, dbl, court};
    });
  }

  /* Last placed: the row with a Time value whose parsed time is most recent */
  function getLastPlaced(normalized){
    const placed = normalized.filter(r => r.time !== null);
    if(!placed.length) return null;
    return placed.reduce((best,r) =>
      r.time.getTime() > best.time.getTime() ? r : best
    );
  }

  /* Latest match per court: among rows assigned to a court,
     pick the one whose Time (or Start Time fallback) is most recent. */
  function getLatestByCourt(normalized){
    const map = new Map();
    for(const r of normalized){
      if(r.court == null) continue;
      const key = r.time ?? r.startTime ?? null; if(!key) continue;
      const prev = map.get(r.court);
      const pk   = prev ? (prev.time ?? prev.startTime) : null;
      if(!prev || key.getTime() > pk.getTime()) map.set(r.court, r);
    }
    return map;
  }

  /* ─────────────────────────────────────────────────────────────
     getUpcoming: rows that do NOT have a value in the Time column,
     returned in their original spreadsheet order (top → bottom),
     limited to UPCOMING_COUNT.
  ───────────────────────────────────────────────────────────── */
  function getUpcoming(normalized){
    return normalized
      .filter(r => !r.hasTime)          // no Time value = not yet placed
      .slice(0, UPCOMING_COUNT);        // preserve original row order, take first N
  }

  /* ─── TV render ─── */
  function renderTV(normalized){
    buildCourtShells();

    // Last placed footer
    const last = getLastPlaced(normalized);
    if(last){
      tvLastName.textContent = `${last.t1d||'—'} vs ${last.t2d||'—'}`;
      tvLastMeta.textContent = `Court ${last.court} · Sched: ${formatTime(last.startTime)} · Started: ${formatTime(last.time)}`;
    } else {
      tvLastName.textContent = '—';
      tvLastMeta.textContent = '—';
    }

    // Court cards
    const latestByCourt = getLatestByCourt(normalized);
    for(const [num,row] of latestByCourt.entries()){
      const card = document.querySelector(`.court[data-court="${num}"]`); if(!card) continue;
      setPlayerCell(card.querySelector('[data-team1]'), row.t1d, row.dbl);
      setPlayerCell(card.querySelector('[data-team2]'), row.t2d, row.dbl);
      card.querySelector('[data-event]').textContent = [row.event,row.round].filter(Boolean).join(' · ');

      const durEl = card.querySelector('[data-dur]');
      if(row.time){
        durEl.textContent = formatDuration(row.time);
        durEl.dataset.started = row.time.toISOString();
      } else {
        durEl.textContent = '—';
        delete durEl.dataset.started;
      }

      card.classList.remove('empty');
      const hot   = row.time && ((new Date()-row.time)/60000 >= HOT_MINUTES);
      const badge = card.querySelector('[data-badge]');
      if(hot){
        card.classList.add('hot');  badge.textContent='2h+ 🔥'; badge.className='court-badge hot';
      } else {
        card.classList.add('live'); badge.textContent='Live';    badge.className='court-badge live';
      }
    }

    // Ticker
    const upcoming = getUpcoming(normalized);
    if(upcoming.length===0){
      tvTicker.innerHTML=`<div class="upcoming-match"><span class="upcoming-teams">No upcoming matches</span></div>`;
    } else {
      const items = upcoming.map((r,i)=>{
        const when = formatTime(r.startTime);
        const mt   = esc(`${r.t1d||'—'} vs ${r.t2d||'—'}`);
        return `<div class="upcoming-match">
          <span class="upcoming-num">${i+1}</span>
          <span class="upcoming-teams">${mt}</span>
          <span class="upcoming-time">${when}</span>
        </div>`;
      }).join('');
      tvTicker.innerHTML = items+items;
      requestAnimationFrame(()=>{
        const w = tvTicker.scrollWidth/2;
        tvTicker.style.animationDuration = Math.max(20,w/45)+'s';
      });
    }
  }

  /* ─── Mobile render ─── */
  function renderMobile(normalized){
    const latestByCourt = getLatestByCourt(normalized);
    const upcoming      = getUpcoming(normalized);
    const last          = getLastPlaced(normalized);
    const html          = [];

    // ── 1. Last Placed ──
    html.push(`<div class="mob-section-label">Last Placed</div>`);
    if(last){
      const evTxt = [last.event,last.round].filter(Boolean).join(' · ');
      html.push(`
        <div class="mob-last-placed">
          <div class="mob-last-top">
            <div class="mob-last-label">Most Recently Placed</div>
            <div class="mob-last-court">Court ${last.court}</div>
          </div>
          <div class="mob-last-teams">${esc(`${last.t1d||'—'} vs ${last.t2d||'—'}`)}</div>
          ${evTxt?`<div class="mob-last-meta">${esc(evTxt)}</div>`:''}
          <div class="mob-last-meta">Started: ${formatTime(last.time)}</div>
        </div>`);
    } else {
      html.push(`<div style="color:var(--muted);font-size:14px;padding:8px 0;">No matches placed yet.</div>`);
    }

    // ── 2. Up Next ──
    html.push(`<div class="mob-section-label">Up Next (${upcoming.length})</div>`);
    if(upcoming.length===0){
      html.push(`<div style="color:var(--muted);font-size:14px;padding:8px 0;">No upcoming matches queued.</div>`);
    } else {
      html.push(`<div class="mob-upcoming">`);
      for(let i=0;i<upcoming.length;i++){
        const r    = upcoming[i];
        const when = formatTime(r.startTime);
        const evTxt= [r.event,r.round].filter(Boolean).join(' · ');
        html.push(`<div class="mob-up-item">
          <div class="mob-up-num">${i+1}</div>
          <div class="mob-up-body">
            <div class="mob-up-teams">${esc(`${r.t1d||'—'} vs ${r.t2d||'—'}`)}</div>
            ${evTxt?`<div class="mob-up-meta">${esc(evTxt)}</div>`:''}
          </div>
          <div class="mob-up-time">${when}</div>
        </div>`);
      }
      html.push(`</div>`);
    }

    // ── 3. On Court Now ──
    const liveCourts = [...latestByCourt.entries()].sort((a,b)=>a[0]-b[0]);
    html.push(`<div class="mob-section-label">On Court Now (${liveCourts.length})</div>`);
    if(liveCourts.length===0){
      html.push(`<div style="color:var(--muted);font-size:14px;padding:8px 0;">No matches currently on court.</div>`);
    } else {
      for(const [num,row] of liveCourts){
        const hot      = row.time && ((new Date()-row.time)/60000 >= HOT_MINUTES);
        const cls      = hot?'hot':'live';
        const badgeTxt = hot?'2h+ 🔥':'Live';
        const evTxt    = [row.event,row.round].filter(Boolean).join(' · ');
        const durStarted = row.time ? `data-started="${row.time.toISOString()}"` : '';
        const durTxt   = row.time ? formatDuration(row.time) : '—';

        const makeMobNames=(display,dbl)=>{
          if(!dbl||!display.includes(' / ')){
            return `<div class="mob-player-name">${esc(display||'—')}</div>`;
          }
          const names=display.split(' / ');
          return `<div class="mob-player-name-stack">${names.map(n=>`<span class="mob-pname">${esc(n)}</span>`).join('')}</div>`;
        };

        html.push(`
          <div class="mob-court ${cls}">
            <div class="mob-court-top">
              <div class="mob-court-num">Court ${num}</div>
              <div class="mob-court-event">${esc(evTxt)}</div>
              <div class="mob-badge ${cls}">${badgeTxt}</div>
            </div>
            <div class="mob-players">
              <div class="mob-player-row">
                <div class="mob-player-dot"></div>
                ${makeMobNames(row.t1d,row.dbl)}
              </div>
              <div class="mob-vs">VS</div>
              <div class="mob-player-row">
                <div class="mob-player-dot"></div>
                ${makeMobNames(row.t2d,row.dbl)}
              </div>
            </div>
            <div class="mob-dur">
              <div class="mob-dur-chip">
                <span class="dlabel">Duration</span>
                <span class="dval" ${durStarted}>${durTxt}</span>
              </div>
            </div>
          </div>`);
      }
    }

    mobMain.innerHTML = html.join('');
  }

  /* ═══════════════════════════════
     FETCH + RENDER BOTH
  ═══════════════════════════════ */
  function renderFromRows(rows){
    const normalized = processRows(rows);
    renderTV(normalized);
    renderMobile(normalized);
  }

  function updateRefreshStamp(){
    const t = fmtClock(new Date());
    tvRefresh.textContent  = `Updated ${t}`;
    mobRefresh.textContent = `Updated ${t}`;
  }

  function loadData(){
    if(loading) return; loading=true;
    fetch(JSON_URL+'?t='+Date.now())
      .then(r=>r.json())
      .then(rows=>{
        try{
          renderFromRows(rows);
          updateRefreshStamp();
          errorBar.classList.remove('show');
        }catch(e){ showError('Render error: '+e.message); console.error(e); }
        finally{ loading=false; }
      })
      .catch(e=>{ showError('Load failed: '+e.message); loading=false; console.error(e); });
  }

  function showError(msg){ errorBar.textContent='⚠ '+msg; errorBar.classList.add('show'); }

  buildCourtShells();
  loadData();
  setInterval(loadData,REFRESH_MS);
</script>
</body>
</html>
