<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Indy Classic Singles Consolation</title>

  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    :root{
      --bg1:#0f172a; --bg2:#1e293b;
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.72);
      --glass: rgba(255,255,255,.10);
      --glassBorder: rgba(255,255,255,.18);
      --shadow: 0 18px 50px rgba(0,0,0,.35);
      --radius: 18px;
      --ok: rgba(34,197,94,.18);
      --warn: rgba(99,102,241,.18);
      --danger: rgba(244,63,94,.18);
      --line: rgba(255,255,255,.18);
      --bye: rgba(99,102,241,.14);
      --seed: rgba(255,255,255,.62);
      --card2: rgba(255,255,255,.07);
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color: var(--text);
      background:
        radial-gradient(1200px 700px at 20% 10%, rgba(99,102,241,.28), transparent 60%),
        radial-gradient(900px 600px at 85% 30%, rgba(34,197,94,.18), transparent 55%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      min-height:100vh;
      padding: 22px;
      overflow-x:hidden;
    }
    .blob{
      position:fixed; width:440px; height:440px;
      border-radius:999px; filter: blur(44px); opacity:.22;
      z-index:0; pointer-events:none;
    }
    .blob.b1{ top:-160px; left:-160px; background: rgba(56,189,248,.95); }
    .blob.b2{ bottom:-200px; right:-170px; background: rgba(168,85,247,.95); }

    .wrap{ max-width: 1180px; margin: 0 auto; position: relative; z-index: 1; padding-bottom: 42px; }
    header{ display:flex; align-items:flex-end; justify-content:space-between; gap: 14px; margin: 10px 0 18px; flex-wrap:wrap; }
    h1{ margin:0; font-size: 26px; font-weight: 850; letter-spacing: -0.02em; line-height: 1.15; }
    .subhead{ font-size: 12.5px; color: var(--muted); }

    .panel{
      background: var(--glass);
      border: 1px solid var(--glassBorder);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 18px;
    }

    .titleRow{ display:flex; justify-content:space-between; align-items:baseline; gap: 10px; margin-bottom: 10px; flex-wrap:wrap; }
    .titleRow h2{ margin:0; font-size: 15px; font-weight: 850; letter-spacing: -0.01em; }

    .pill{
      font-size: 12.5px;
      color: rgba(255,255,255,.85);
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      padding: 8px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .notice{
      display:flex; flex-direction:column; gap: 10px;
      padding: 14px; border-radius: 16px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
    }

    .form{ display:flex; flex-direction:column; gap: 12px; margin-top: 8px; }
    label{ font-size: 12.5px; color: var(--muted); font-weight: 700; }
    select{
      width:100%;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(15,23,42,.35);
      color: var(--text);
      outline: none;
    }

    .infoBox{
      padding: 12px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.85);
      line-height: 1.45;
      font-size: 13px;
      min-height: 48px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }

    .btn{
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.12);
      color: var(--text);
      padding: 12px 14px;
      border-radius: 14px;
      cursor:pointer;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(0,0,0,.18);
      transition: transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
      -webkit-tap-highlight-color: transparent;
    }
    @media (hover:hover) and (pointer:fine){
      .btn:hover{
        transform: translateY(-2px);
        background: rgba(255,255,255,.16);
        border-color: rgba(255,255,255,.26);
        box-shadow: 0 14px 34px rgba(0,0,0,.25);
      }
    }
    .btn:active{ transform: scale(.99); }
    .btn:disabled{ opacity:.55; cursor:not-allowed; transform:none; }

    .status{
      margin-top: 14px;
      padding: 12px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      font-size: 13px;
      color: rgba(255,255,255,.9);
      display:none;
    }
    .status.ok{ background: var(--ok); display:block; }
    .status.warn{ background: var(--warn); display:block; }
    .status.err{ background: var(--danger); display:block; }

    .spinner{
      width: 18px; height: 18px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: rgba(255,255,255,.95);
      display:inline-block;
      vertical-align: -3px;
      animation: spin .9s linear infinite;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Entries summary */
    .summaryGrid{
      margin-top: 14px;
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .divCard{
      padding: 12px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
    }
    .divTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      flex-wrap:wrap;
      margin-bottom: 8px;
    }
    .divName{
      font-weight: 900;
      letter-spacing: -0.01em;
    }
    .nameList{
      margin:0;
      padding:0;
      list-style:none;
      display:flex;
      flex-wrap:wrap;
      gap: 8px;
    }
    .nameChip{
      font-size: 12.5px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: rgba(255,255,255,.88);
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Draws UI */
    .drawControls{
      display:grid;
      grid-template-columns: minmax(220px, 420px) 1fr;
      gap: 14px;
      align-items:end;
      margin-top: 10px;
    }
    .metaGrid{
      margin-top: 14px;
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 12px;
    }
    .metaCard{
      background: var(--card2);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      padding: 12px;
    }
    .metaLabel{
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .metaValue{
      font-weight: 900;
      font-size: 20px;
      letter-spacing: -.02em;
    }

    .drawWrap{
      margin-top: 16px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    .bracket{
      display:flex;
      gap: 26px;
      min-width: max-content;
      align-items:flex-start;
    }
    .roundCol{
      min-width: 250px;
    }
    .roundTitle{
      font-weight: 900;
      margin-bottom: 12px;
      letter-spacing: -.01em;
    }
    .roundStack{
      display:flex;
      flex-direction:column;
    }

    .matchCard{
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.14);
      overflow:hidden;
      min-height: 84px;
    }
    .playerRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 11px 12px;
    }
    .playerRow + .playerRow{
      border-top: 1px solid rgba(255,255,255,.10);
    }
    .playerLeft{
      display:flex;
      align-items:center;
      gap: 8px;
      min-width:0;
    }
    .seedBadge{
      min-width: 32px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-size: 11px;
      font-weight: 900;
      color: rgba(255,255,255,.9);
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.12);
      flex: 0 0 auto;
    }
    .playerName{
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .playerNum{
      color: var(--seed);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .byeRow{
      background: var(--bye);
    }

    .seedList{
      margin-top: 16px;
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }
    .seedItem{
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 10px 12px;
      display:flex;
      justify-content:space-between;
      gap: 10px;
      align-items:center;
    }

    .emptyDraw{
      margin-top: 14px;
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.88);
    }

    @media (max-width: 900px){
      .drawControls{
        grid-template-columns: 1fr;
      }
      .metaGrid{
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px){
      body{ padding: 16px; }
      h1{ font-size: 22px; }
      .panel{ padding: 16px; }
      .roundCol{ min-width: 220px; }
    }
  </style>
</head>

<body>
  <div class="blob b1"></div>
  <div class="blob b2"></div>

  <div class="wrap">
    <header>
      <div>
        <h1>Indy Classic Singles Consolation</h1>
        <div class="subhead" id="smallNote">Loading…</div>
      </div>
      <div class="pill" id="modePill">Checking status…</div>
    </header>

    <section class="panel" id="mainPanel"></section>
    <div class="status" id="statusBox"></div>
  </div>

<script>
  // Control CSV
  const CONTROL_CSV =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vStQmNzT7R_NGV3fDuU3WZxxU30qtFW_EgDtrzalrUUolTFpBIybSVIcUO_pOTEUVVgohgiWx4hjNSY/pub?gid=1244457974&single=true&output=csv";

  // Entry list CSV
  const ENTRY_CSV =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vStQmNzT7R_NGV3fDuU3WZxxU30qtFW_EgDtrzalrUUolTFpBIybSVIcUO_pOTEUVVgohgiWx4hjNSY/pub?gid=552112433&single=true&output=csv";

  // Submissions CSV (read-only; used for duplicates + counts + draws)
  const SUBMISSIONS_CSV =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vStQmNzT7R_NGV3fDuU3WZxxU30qtFW_EgDtrzalrUUolTFpBIybSVIcUO_pOTEUVVgohgiWx4hjNSY/pub?gid=742310415&single=true&output=csv";

  // Apps Script Web App URL
  const APPS_SCRIPT_WEBAPP_URL =
    "https://script.google.com/macros/s/AKfycbxQe4RiJJDFs4Ed1McY67vPdpIQjf5K4TWimgGCO3KENiyYXEcbt_5xkW0AuJGaFpBjJA/exec";

  const mainPanel = document.getElementById("mainPanel");
  const modePill = document.getElementById("modePill");
  const smallNote = document.getElementById("smallNote");
  const statusBox = document.getElementById("statusBox");

  const tidy = v => (v == null ? "" : String(v).trim());
  const upper = v => tidy(v).toUpperCase();

  function showStatus(type, msg){
    statusBox.className = "status " + type;
    statusBox.textContent = msg;
    statusBox.style.display = "block";
  }
  function clearStatus(){
    statusBox.className = "status";
    statusBox.textContent = "";
    statusBox.style.display = "none";
  }

  async function parseCSV(url){
    const bust = url + (url.includes("?") ? "&" : "?") + "t=" + Date.now();

    const response = await fetch(bust, {
      cache: "no-store"
    });

    if (!response.ok) {
      throw new Error(`Failed to fetch CSV: ${response.status} ${response.statusText}`);
    }

    const text = await response.text();

    return new Promise((resolve, reject) => {
      Papa.parse(text, {
        header: true,
        skipEmptyLines: "greedy",
        complete: (res) => resolve(res.data || []),
        error: (err) => reject(err)
      });
    });
  }

  function getControlFlags(rows){
    const flags = {};
    for(const r of rows){
      const view = tidy(r["View"]);
      const cur = upper(r["Current"]);
      if(view) flags[view] = (cur === "Y");
    }
    return flags;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function renderComingSoon(){
    modePill.textContent = "Coming Soon";
    mainPanel.innerHTML = `
      <div class="titleRow">
        <h2>Status</h2>
        <div class="pill">Not open yet</div>
      </div>
      <div class="notice">
        <div><strong>Indy Classic Singles Consolation Coming Soon</strong></div>
      </div>
    `;
  }

  function renderNotActive(){
    modePill.textContent = "Not Active";
    mainPanel.innerHTML = `
      <div class="titleRow">
        <h2>Status</h2>
        <div class="pill">Unavailable</div>
      </div>
      <div class="notice">
        <div><strong>This page is not active right now.</strong></div>
      </div>
    `;
  }

  function canonicalPersonKey(firstname, name){
    return (tidy(firstname).toLowerCase() + "|" + tidy(name).toLowerCase()).trim();
  }

  async function loadSubmissions(){
    const rows = await parseCSV(SUBMISSIONS_CSV);
    return rows
      .map(r => ({
        name: tidy(r["Name"]),
        firstname: tidy(r["Firstname"]),
        singles: tidy(r["Singles"]),
        number: Number(tidy(r["Number"]))
      }))
      .filter(p => (p.firstname || p.name) && p.singles);
  }

  async function loadUsedNumbers(){
    const subs = await loadSubmissions();
    const used = new Set();
    for(const p of subs){
      if(Number.isFinite(p.number)) used.add(p.number);
    }
    return used;
  }

  function pickUniqueNumber(used){
    if(used.size >= 1000) return null;
    for(let tries=0; tries<5000; tries++){
      const candidate = Math.floor(Math.random() * 1000) + 1;
      if(!used.has(candidate)) return candidate;
    }
    for(let i=1;i<=1000;i++) if(!used.has(i)) return i;
    return null;
  }

  function buildDivisionSummary(submissions){
    const byDivision = new Map();
    for(const s of submissions){
      const div = tidy(s.singles);
      if(!div) continue;
      const pKey = canonicalPersonKey(s.firstname, s.name);
      if(!pKey) continue;
      const display = `${s.firstname} ${s.name}`.trim() || "—";
      if(!byDivision.has(div)) byDivision.set(div, new Map());
      byDivision.get(div).set(pKey, display);
    }

    const divisions = Array.from(byDivision.keys()).sort((a,b) => a.localeCompare(b));

    const html = divisions.map(div => {
      const peopleMap = byDivision.get(div);
      const names = Array.from(peopleMap.values()).sort((a,b) => a.localeCompare(b));
      return `
        <div class="divCard">
          <div class="divTop">
            <div class="divName">${escapeHtml(div)}</div>
            <div class="pill">${names.length}</div>
          </div>
          <ul class="nameList">
            ${names.map(n => `<li class="nameChip">${escapeHtml(n)}</li>`).join("")}
          </ul>
        </div>
      `;
    }).join("");

    const totalUnique = (() => {
      const set = new Set();
      for(const s of submissions){
        const k = canonicalPersonKey(s.firstname, s.name) + "|" + tidy(s.singles).toLowerCase();
        set.add(k);
      }
      return set.size;
    })();

    return `
      <div class="titleRow" style="margin-top:14px;">
        <h2>Current Signups</h2>
        <div class="pill">Total entries: ${totalUnique}</div>
      </div>
      <div class="summaryGrid">
        ${html || `<div class="notice">No signups yet.</div>`}
      </div>
    `;
  }

  async function renderEntryOpen(){
    modePill.textContent = "Entry Open";
    clearStatus();

    let entryRows = [];
    try{
      entryRows = await parseCSV(ENTRY_CSV);
    }catch(e){
      showStatus("err", "Could not load the entry list.");
      mainPanel.innerHTML = `
        <div class="titleRow"><h2>Entry</h2><div class="pill">Error</div></div>
        <div class="notice">Unable to load the entry list CSV.</div>
      `;
      return;
    }

    let submissions = [];
    try{
      submissions = await loadSubmissions();
    }catch(e){
      submissions = [];
    }

    const alreadySignedUp = new Set(
      submissions.map(s => canonicalPersonKey(s.firstname, s.name)).filter(Boolean)
    );

    const players = entryRows
      .map(r => ({
        name: tidy(r["Name"]),
        firstname: tidy(r["Firstname"]),
        singles: tidy(r["Singles"]),
        include: upper(r["Include"])
      }))
      .filter(p => p.include === "Y" && (p.name || p.firstname))
      .sort((a,b) => (a.firstname + " " + a.name).localeCompare(b.firstname + " " + b.name));

    mainPanel.innerHTML = `
      <div class="titleRow">
        <h2>Enter Consolation Draws</h2>
        <div class="pill">2026 Indy Classic</div>
      </div>

      <div class="notice">
        <div><strong>Select your name from the drop down menu and SUBMIT to enter the 2026 Indy Classic consolation draws</strong></div>
      </div>

      <div class="form">
        <div>
          <label for="playerSelect">Your name</label>
          <select id="playerSelect">
            <option value="">— Select —</option>
          </select>
        </div>

        <div>
          <label>Singles</label>
          <div class="infoBox" id="singlesBox">Select a name to see Singles info</div>
        </div>

        <button class="btn" id="submitBtn" disabled>Submit</button>
      </div>

      <div id="summaryArea"></div>
    `;

    const select = document.getElementById("playerSelect");
    const singlesBox = document.getElementById("singlesBox");
    const submitBtn = document.getElementById("submitBtn");
    const summaryArea = document.getElementById("summaryArea");

    summaryArea.innerHTML = buildDivisionSummary(submissions);

    for(const p of players){
      const label = `${p.firstname} ${p.name}`.trim();
      const pKey = canonicalPersonKey(p.firstname, p.name);

      const opt = document.createElement("option");
      opt.value = label;
      opt.textContent = alreadySignedUp.has(pKey) ? `${label} (Already Signed Up)` : label;
      opt.dataset.firstname = p.firstname;
      opt.dataset.name = p.name;
      opt.dataset.singles = p.singles;

      if(alreadySignedUp.has(pKey)){
        opt.disabled = true;
      }
      select.appendChild(opt);
    }

    select.addEventListener("change", () => {
      clearStatus();
      const opt = select.selectedOptions[0];
      const singles = opt?.dataset?.singles || "";
      if(!select.value){
        singlesBox.textContent = "Select a name to see Singles info";
        submitBtn.disabled = true;
        return;
      }
      singlesBox.textContent = singles || "—";
      submitBtn.disabled = false;
    });

    submitBtn.addEventListener("click", async () => {
      clearStatus();

      const opt = select.selectedOptions[0];
      const firstname = opt?.dataset?.firstname || "";
      const name = opt?.dataset?.name || "";
      const singles = opt?.dataset?.singles || "";

      if(!firstname || !name){
        showStatus("err", "Please select your name.");
        return;
      }

      const pKey = canonicalPersonKey(firstname, name);

      try{
        const latestSubs = await loadSubmissions();
        const latestSet = new Set(latestSubs.map(s => canonicalPersonKey(s.firstname, s.name)));
        if(latestSet.has(pKey)){
          showStatus("err", "You are already signed up.");
          submitBtn.disabled = true;
          return;
        }
      }catch(_){}

      submitBtn.disabled = true;
      submitBtn.innerHTML = `<span class="spinner"></span>Submitting…`;

      try{
        const used = await loadUsedNumbers().catch(() => new Set());
        const number = pickUniqueNumber(used);
        if(number == null) throw new Error("All numbers 1–1000 are already used.");

        const fd = new FormData();
        fd.append("firstname", firstname);
        fd.append("name", name);
        fd.append("singles", singles);
        fd.append("number", String(number));

        await fetch(APPS_SCRIPT_WEBAPP_URL, { method:"POST", mode:"no-cors", body: fd });

        showStatus("ok", "Submitted!");

        try{
          const latestSubs = await loadSubmissions();
          summaryArea.innerHTML = buildDivisionSummary(latestSubs);
          opt.textContent = `${firstname} ${name} (Already Signed Up)`;
          opt.disabled = true;
          select.value = "";
          singlesBox.textContent = "Select a name to see Singles info";
        }catch(_){}

      }catch(e){
        showStatus("err", e.message || "Submission failed.");
      }finally{
        submitBtn.innerHTML = "Submit";
        submitBtn.disabled = true;
      }
    });
  }

  function getDrawSize(count){
    if(count <= 0) return 0;
    if(count <= 2) return 2;
    if(count <= 4) return 4;
    if(count <= 8) return 8;
    if(count <= 16) return 16;
    if(count <= 32) return 32;
    return 32;
  }

  function nextPowerRounds(drawSize){
    return Math.log2(drawSize);
  }

  function generateSeedOrder(size){
    if(size === 1) return [1];
    let arr = [1, 2];
    while(arr.length < size){
      const nextSize = arr.length * 2;
      const next = [];
      for(const seed of arr){
        next.push(seed);
        next.push(nextSize + 1 - seed);
      }
      arr = next;
    }
    return arr;
  }

  function round1PairsFromSeedOrder(seedOrder){
    const pairs = [];
    for(let i = 0; i < seedOrder.length; i += 2){
      pairs.push([seedOrder[i], seedOrder[i + 1]]);
    }
    return pairs;
  }

  function buildRoundsFromRound1(round1Matches){
    const rounds = [round1Matches];
    let currentCount = round1Matches.length;
    while(currentCount > 1){
      currentCount = currentCount / 2;
      rounds.push(Array.from({ length: currentCount }, () => null));
    }
    return rounds;
  }

  function getRoundName(index, totalRounds){
    const remaining = totalRounds - index;
    if(remaining === 1) return "Final";
    if(remaining === 2) return "Semifinals";
    if(remaining === 3) return "Quarterfinals";
    if(remaining === 4) return "Round of 16";
    if(remaining === 5) return "Round of 32";
    return `Round ${index + 1}`;
  }

  function buildDivisionPlayers(submissions, division){
    return submissions
      .filter(s => tidy(s.singles) === tidy(division))
      .filter(s => (s.firstname || s.name))
      .sort((a, b) => {
        const aNum = Number.isFinite(a.number) ? a.number : -Infinity;
        const bNum = Number.isFinite(b.number) ? b.number : -Infinity;
        if(bNum !== aNum) return bNum - aNum;
        const an = `${a.firstname} ${a.name}`.trim().toLowerCase();
        const bn = `${b.firstname} ${b.name}`.trim().toLowerCase();
        return an.localeCompare(bn);
      })
      .map((p, i) => ({
        seed: i + 1,
        firstname: p.firstname,
        name: p.name,
        displayName: `${p.firstname} ${p.name}`.trim() || "—",
        singles: p.singles,
        number: Number.isFinite(p.number) ? p.number : null
      }));
  }

  function buildDrawData(players){
    const count = players.length;
    const drawSize = getDrawSize(count);
    if(!drawSize) return null;

    const seedMap = new Map(players.map(p => [p.seed, p]));
    const seedOrder = generateSeedOrder(drawSize);
    const round1SeedPairs = round1PairsFromSeedOrder(seedOrder);

    const round1Matches = round1SeedPairs.map(([seedA, seedB]) => ({
      slotA: seedA,
      slotB: seedB,
      playerA: seedMap.get(seedA) || null,
      playerB: seedMap.get(seedB) || null
    }));

    const rounds = buildRoundsFromRound1(round1Matches);

    return {
      drawSize,
      rounds,
      totalRounds: nextPowerRounds(drawSize),
      round1SeedPairs
    };
  }

  function renderPlayerRow(player, slotSeed){
    const isBye = !player;
    return `
      <div class="playerRow ${isBye ? 'byeRow' : ''}">
        <div class="playerLeft">
          <div class="seedBadge">${slotSeed}</div>
          <div class="playerName">${isBye ? 'BYE' : escapeHtml(player.displayName)}</div>
        </div>
        <div class="playerNum">${isBye ? '' : `# ${player.number ?? '—'}`}</div>
      </div>
    `;
  }

  function renderBracket(rounds, totalRounds){
    return `
      <div class="drawWrap">
        <div class="bracket">
          ${rounds.map((round, roundIndex) => {
            const spacer = roundIndex === 0 ? 0 : ((Math.pow(2, roundIndex) - 1) * 54);
            const between = roundIndex === 0 ? 12 : ((Math.pow(2, roundIndex) * 108) - 96);

            return `
              <div class="roundCol">
                <div class="roundTitle">${getRoundName(roundIndex, totalRounds)}</div>
                <div class="roundStack" style="padding-top:${spacer}px; gap:${between}px;">
                  ${round.map((match, matchIndex) => {
                    if(roundIndex === 0){
                      return `
                        <div class="matchCard" data-round="${roundIndex + 1}" data-match="${matchIndex + 1}">
                          ${renderPlayerRow(match.playerA, match.slotA)}
                          ${renderPlayerRow(match.playerB, match.slotB)}
                        </div>
                      `;
                    }
                    return `
                      <div class="matchCard" data-round="${roundIndex + 1}" data-match="${matchIndex + 1}">
                        <div class="playerRow">
                          <div class="playerLeft">
                            <div class="seedBadge">W</div>
                            <div class="playerName">Winner of prior match</div>
                          </div>
                        </div>
                        <div class="playerRow">
                          <div class="playerLeft">
                            <div class="seedBadge">W</div>
                            <div class="playerName">Winner of prior match</div>
                          </div>
                        </div>
                      </div>
                    `;
                  }).join("")}
                </div>
              </div>
            `;
          }).join("")}
        </div>
      </div>
    `;
  }

  function renderSeedList(players){
    if(!players.length) return "";
    return `
      <div class="titleRow" style="margin-top:18px;">
        <h2>Seeds</h2>
        <div class="pill">${players.length} players ranked by Number</div>
      </div>
      <div class="seedList">
        ${players.map(p => `
          <div class="seedItem">
            <div><strong>${p.seed} Seed</strong> — ${escapeHtml(p.displayName)}</div>
            <div class="pill">Number: ${p.number ?? '—'}</div>
          </div>
        `).join("")}
      </div>
    `;
  }

  async function renderDraws(){
    modePill.textContent = "Draws";
    clearStatus();

    let submissions = [];
    try{
      submissions = await loadSubmissions();
    }catch(e){
      showStatus("err", "Could not load the submissions CSV.");
      mainPanel.innerHTML = `
        <div class="titleRow"><h2>Draws</h2><div class="pill">Error</div></div>
        <div class="notice">Unable to load the submissions CSV.</div>
      `;
      return;
    }

    const divisions = Array.from(
      new Set(submissions.map(s => tidy(s.singles)).filter(Boolean))
    ).sort((a,b) => a.localeCompare(b));

    mainPanel.innerHTML = `
      <div class="titleRow">
        <h2>Consolation Draws</h2>
        <div class="pill">2026 Indy Classic</div>
      </div>

      <div class="notice">
        <div><strong>Select a Singles division to view the draw.</strong></div>
        <div>Players are seeded by <strong>Number</strong> within that division, highest number = 1 seed.</div>
      </div>

      <div class="drawControls">
        <div>
          <label for="drawDivisionSelect">Singles Division</label>
          <select id="drawDivisionSelect">
            <option value="">— Select Division —</option>
            ${divisions.map(d => `<option value="${escapeHtml(d)}">${escapeHtml(d)}</option>`).join("")}
          </select>
        </div>
        <div class="infoBox" id="drawInfoBox">Choose a division to generate the draw</div>
      </div>

      <div id="drawOutput"></div>
    `;

    const drawDivisionSelect = document.getElementById("drawDivisionSelect");
    const drawInfoBox = document.getElementById("drawInfoBox");
    const drawOutput = document.getElementById("drawOutput");

    function paintDivision(division){
      if(!division){
        drawInfoBox.textContent = "Choose a division to generate the draw";
        drawOutput.innerHTML = "";
        return;
      }

      const players = buildDivisionPlayers(submissions, division);
      const count = players.length;
      const drawSize = getDrawSize(count);

      if(count === 0){
        drawInfoBox.textContent = `${division}: no players found`;
        drawOutput.innerHTML = `<div class="emptyDraw">No players were found for this division.</div>`;
        return;
      }

      if(count > 32){
        drawInfoBox.textContent = `${division}: too many players for current draw logic`;
        drawOutput.innerHTML = `<div class="emptyDraw">This division has ${count} players. Current draw logic supports up to 32 players.</div>`;
        return;
      }

      const drawData = buildDrawData(players);
      drawInfoBox.textContent = `${division}: ${count} player${count === 1 ? '' : 's'} → ${drawSize}-player draw`;

      drawOutput.innerHTML = `
        <div class="metaGrid">
          <div class="metaCard">
            <div class="metaLabel">Division</div>
            <div class="metaValue">${escapeHtml(division)}</div>
          </div>
          <div class="metaCard">
            <div class="metaLabel">Entries</div>
            <div class="metaValue">${count}</div>
          </div>
          <div class="metaCard">
            <div class="metaLabel">Draw Size</div>
            <div class="metaValue">${drawSize}</div>
          </div>
        </div>

        ${renderBracket(drawData.rounds, drawData.totalRounds)}
        ${renderSeedList(players)}
      `;
    }

    drawDivisionSelect.addEventListener("change", () => {
      paintDivision(drawDivisionSelect.value);
    });

    if(divisions.length === 1){
      drawDivisionSelect.value = divisions[0];
      paintDivision(divisions[0]);
    }
  }

  async function init(){
    clearStatus();
    smallNote.textContent = "Loading…";
    modePill.textContent = "Checking status…";

    try{
      const controlRows = await parseCSV(CONTROL_CSV);
      const flags = getControlFlags(controlRows);

      if(flags["Coming Soon"]){
        renderComingSoon();
      }else if(flags["Entry Open"]){
        await renderEntryOpen();
      }else if(flags["Draws"]){
        await renderDraws();
      }else{
        renderNotActive();
      }

      smallNote.textContent = "";
    }catch(e){
      modePill.textContent = "Error";
      showStatus("err", "Could not load the control CSV.");
      renderNotActive();
      smallNote.textContent = "";
    }
  }

  init();
</script>
</body>
</html>
