<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Indy Attractions | Indy Classic 2026</title>

  <style>
    :root{
      --bg:#0f172a;
      --card:#111c33;
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.72);
      --border:rgba(255,255,255,.12);
      --sponsorBg:rgba(34,197,94,.12);
      --sponsorBorder:rgba(34,197,94,.35);
      --chipBg:rgba(255,255,255,.10);
      --radius:18px;
      --max: 980px;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif;
      background: radial-gradient(1200px 700px at 20% 0%, #1e2a5a 0%, var(--bg) 55%) fixed;
      color:var(--text);
    }

    .wrap{ max-width: var(--max); margin: 0 auto; padding: 18px 14px 44px; }

    /* UPDATED HERO */
    .hero{
      border-radius: 24px;
      padding: 22px;
      background:
        radial-gradient(900px 260px at 10% 0%, rgba(255,255,255,.10) 0%, rgba(255,255,255,0) 60%),
        radial-gradient(900px 260px at 90% 0%, rgba(255,255,255,.08) 0%, rgba(255,255,255,0) 60%),
        linear-gradient(90deg, rgba(255,255,255,.08), rgba(255,255,255,.06));
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: 0 22px 70px rgba(0,0,0,.40);
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom: 14px;
    }

    .logoBox{
      width:min(100%,240px);
      padding:10px;
      border-radius:18px;
      background:rgba(255,255,255,.96);
      border:1px solid rgba(255,255,255,.35);
      box-shadow:0 14px 30px rgba(0,0,0,.30);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .logoBox img{
      width:100%;
      max-width:220px;
      height:auto;
      object-fit:contain;
      display:block;
    }

    .pageTitle{
      text-align:center;
      margin: 10px 0 0;
      font-size: 1.55rem;
      letter-spacing:.2px;
    }

    .sub{
      margin: 6px 0 0;
      color: var(--muted);
      font-size: .98rem;
      line-height: 1.35;
      text-align:center;
    }

    .status{
      margin: 16px 0 10px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255,255,255,.06);
      color: var(--muted);
      font-size: .95rem;
    }

    .section{
      margin-top: 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: rgba(255,255,255,.06);
      overflow:hidden;
    }

    .sectionHeader{
      padding: 14px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,.04);
    }

    .sectionHeader h2{
      margin:0;
      font-size: 1.15rem;
    }

    .count{
      font-size: .9rem;
      color: var(--muted);
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--chipBg);
      border: 1px solid var(--border);
    }

    .list{
      padding: 10px 12px 12px;
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .card{
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card);
      padding: 12px;
      box-shadow: 0 10px 28px rgba(0,0,0,.22);
    }

    .card.sponsor{
      border-color: var(--sponsorBorder);
      background: linear-gradient(0deg, var(--sponsorBg), var(--card));
    }

    .topRow{
      display:flex;
      justify-content:space-between;
      gap:10px;
    }

    .name{
      margin:0;
      font-weight: 800;
      font-size: 1.05rem;
    }

    .chip{
      font-size: .82rem;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--sponsorBorder);
      background: rgba(34,197,94,.16);
    }

    .meta{
      margin-top: 6px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      color: var(--muted);
      font-size: .93rem;
    }

    a{ color: #93c5fd; text-decoration: none; }
    a:hover{ text-decoration: underline; }

    .visitIndy{
      margin-top: 26px;
      padding: 16px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.18);
      text-align:center;
    }

    footer{
      margin-top: 18px;
      color: var(--muted);
      font-size: .9rem;
      text-align:center;
    }

    @media (min-width: 760px){
      .list{ grid-template-columns: 1fr 1fr; }

      .logoBox{
        width:min(100%,200px);
      }

      .logoBox img{
        max-width:184px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="hero">
      <div class="logoBox">
        <img src="profile.jpg.png" alt="Indy Classic Tournament Logo" />
      </div>
    </div>

    <h1 class="pageTitle">Indy Attractions</h1>

    <div id="status" class="status">Loading attractions…</div>
    <div id="content"></div>

    <div class="visitIndy">
      <a href="https://www.visitindy.com" target="_blank">
        Click here to search for events and activities happening in Indy!
      </a>
    </div>

    <footer></footer>
  </div>

  <!-- script unchanged -->
</body>
</html>
