<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Indy Classic – Financials</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Rajdhani:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a1628;
    --navy-mid: #0e1e38;
    --navy-light: #162840;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: #8a6d2a;
    --green: #1a4a2e;
    --green-bright: #2d7a4a;
    --glass-bg: rgba(255,255,255,0.05);
    --glass-border: rgba(201,168,76,0.2);
    --glass-hover: rgba(255,255,255,0.08);
    --text-primary: #f0e8d0;
    --text-secondary: rgba(240,232,208,0.65);
    --text-dim: rgba(240,232,208,0.35);
    --red: #e05050;
    --positive: #4caf7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--navy);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background ── */
  .bg-layer {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(26,74,46,0.35) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 85% 80%, rgba(201,168,76,0.12) 0%, transparent 55%),
      radial-gradient(ellipse 100% 100% at 50% 50%, #0a1628 0%, #060e1a 100%);
  }
  .bg-court {
    position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
    background-image:
      linear-gradient(0deg, transparent 49.5%, rgba(201,168,76,0.8) 49.5%, rgba(201,168,76,0.8) 50.5%, transparent 50.5%),
      linear-gradient(90deg, transparent 49.5%, rgba(201,168,76,0.8) 49.5%, rgba(201,168,76,0.8) 50.5%, transparent 50.5%);
    background-size: 80px 80px;
  }

  /* ── Layout ── */
  .page-wrap {
    position: relative; z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── Header ── */
  header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.8s ease both;
  }
  .logo-shield {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 20px;
  }
  .logo-img {
    width: 160px;
    height: 160px;
    object-fit: contain;
    filter: drop-shadow(0 0 28px rgba(201,168,76,0.35));
  }
  .page-heading {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.45em;
    color: var(--gold);
    text-transform: uppercase;
    margin-top: 20px;
    opacity: 0.8;
  }
  .divider-gold {
    width: 120px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 12px auto 0;
  }

  /* ── Glass Card ── */
  .glass-card {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
    animation: fadeUp 0.7s ease both;
  }
  .glass-card + .glass-card { margin-top: 24px; }

  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.02);
  }
  .card-header-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--gold);
  }
  .card-total {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px; font-weight: 700;
    letter-spacing: 0.05em;
  }
  .card-total.revenue { color: var(--positive); }
  .card-total.expense { color: var(--red); }

  /* ── Line Items ── */
  .line-items { padding: 8px 0; }
  .line-item {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 10px 24px;
    gap: 16px;
    transition: background 0.15s;
    border-bottom: 1px solid rgba(255,255,255,0.03);
  }
  .line-item:last-child { border-bottom: none; }
  .line-item:hover { background: var(--glass-hover); }
  .line-item.has-note { grid-template-columns: 1fr auto; }

  .item-label {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-primary);
    opacity: 0.9;
  }

  .item-amount {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px; font-weight: 600;
    letter-spacing: 0.03em;
    white-space: nowrap;
    min-width: 100px; text-align: right;
  }

  .revenue-amt { color: rgba(76,175,122,0.9); }
  .expense-amt { color: var(--text-primary); }

  /* ── Add Row ── */
  .add-row-btn {
    display: flex; align-items: center; gap: 6px;
    width: 100%; padding: 10px 24px;
    background: none; border: none; cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 13px; color: var(--text-dim);
    transition: color 0.15s, background 0.15s;
    border-top: 1px dashed rgba(255,255,255,0.06);
  }
  .add-row-btn:hover { color: var(--gold); background: rgba(201,168,76,0.04); }
  .add-row-btn span.plus { font-size: 16px; line-height: 1; }

  /* ── Net Income Banner ── */
  .net-banner {
    background: linear-gradient(135deg, rgba(26,74,46,0.5), rgba(10,22,40,0.7));
    border: 1px solid rgba(76,175,122,0.3);
    border-radius: 16px;
    padding: 28px 32px;
    display: flex; justify-content: space-between; align-items: center;
    flex-wrap: wrap; gap: 16px;
    margin-top: 24px;
    box-shadow: 0 0 40px rgba(76,175,122,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
    animation: fadeUp 0.9s 0.2s ease both;
    opacity: 0;
  }
  .net-banner.negative {
    background: linear-gradient(135deg, rgba(80,20,20,0.5), rgba(10,22,40,0.7));
    border-color: rgba(224,80,80,0.3);
    box-shadow: 0 0 40px rgba(224,80,80,0.08), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .net-label {
    font-family: 'Playfair Display', serif;
    font-size: 20px; font-weight: 700;
    color: var(--text-primary);
  }
  .net-label small {
    display: block;
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px; font-weight: 700;
    letter-spacing: 0.35em; text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 2px;
  }
  .net-amount {
    font-family: 'Rajdhani', sans-serif;
    font-size: 36px; font-weight: 700;
    letter-spacing: 0.03em;
    color: var(--positive);
    text-shadow: 0 0 20px rgba(76,175,122,0.3);
  }
  .net-amount.negative { color: var(--red); text-shadow: 0 0 20px rgba(224,80,80,0.3); }

  /* ── Sponsorships note ── */
  .footnote {
    font-size: 12px; color: var(--text-dim);
    padding: 12px 24px;
    font-style: italic;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  /* ── Edit hint ── */
  .edit-hint {
    text-align: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px; letter-spacing: 0.25em;
    color: var(--text-dim); text-transform: uppercase;
    margin-top: 20px;
    animation: fadeUp 1s 0.4s ease both; opacity: 0;
  }

  /* ── Animations ── */
  @keyframes fadeDown { from { opacity:0; transform: translateY(-20px); } to { opacity:1; transform: none; } }
  @keyframes fadeUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: none; } }
  .glass-card { animation-delay: var(--delay, 0s); opacity: 0; animation-fill-mode: both; }
  .glass-card:nth-child(1) { --delay: 0.1s; }
  .glass-card:nth-child(2) { --delay: 0.2s; }
  .glass-card:nth-child(3) { --delay: 0.3s; }

  /* ── Inline note tag ── */
  .note-tag {
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    background: rgba(201,168,76,0.12); color: var(--gold-dim);
    border-radius: 4px; padding: 1px 5px;
    font-family: 'Rajdhani', sans-serif; font-weight: 600;
  }

  /* ── Delete row btn ── */
  .del-btn {
    opacity: 0; background: none; border: none; cursor: pointer;
    color: var(--red); font-size: 14px; padding: 2px 4px; margin-left: 4px;
    border-radius: 4px; transition: opacity 0.15s, background 0.15s;
  }
  .line-item:hover .del-btn { opacity: 0.5; }
  .del-btn:hover { opacity: 1 !important; background: rgba(224,80,80,0.1); }

  /* ── Totals row ── */
  .subtotal-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 24px;
    border-top: 1px solid rgba(201,168,76,0.2);
    background: rgba(201,168,76,0.04);
  }
  .subtotal-row .lbl {
    font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold);
  }
  .subtotal-row .val {
    font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-court"></div>

<div class="page-wrap">

  <!-- ── HEADER ── -->
  <header>
    <div class="logo-shield">
      <!-- UPDATE src to your GitHub raw URL:
           https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/profile.jpg.png -->
      <img class="logo-img" src="profile.jpg.png" alt="2026 Indy Classic">
    </div>
    <div class="page-heading">2026 Indy Classic · Income Statement</div>
    <div class="divider-gold"></div>
  </header>

  <!-- ── REVENUES ── -->
  <div class="glass-card" id="revenue-card">
    <div class="card-header">
      <span class="card-header-label">Revenues</span>
      <span class="card-total revenue" id="revenue-total">$0.00</span>
    </div>
    <div class="line-items" id="revenue-items"></div>
  </div>

  <!-- ── EXPENSES ── -->
  <div class="glass-card" id="expense-card">
    <div class="card-header">
      <span class="card-header-label">Expenses</span>
      <span class="card-total expense" id="expense-total">$0.00</span>
    </div>
    <div class="line-items" id="expense-items"></div>
  </div>

  <!-- ── SPONSORSHIPS (separate section) ── -->
  <div class="glass-card" id="sponsor-card">
    <div class="card-header">
      <span class="card-header-label">Additional Income</span>
      <span class="card-total revenue" id="sponsor-total">$0.00</span>
    </div>
    <div class="line-items" id="sponsor-items"></div>
  </div>

  <!-- ── NET INCOME ── -->
  <div class="net-banner" id="net-banner">
    <div class="net-label">
      <small>Net Income · Tournament</small>
      After All Revenues &amp; Expenses
    </div>
    <div class="net-amount" id="net-amount">$0.00</div>
  </div>



</div>

<script>
// ════════════════════════════════════════════════════════════════════
//  FINANCIAL DATA — edit amounts and labels directly here in the code
// ════════════════════════════════════════════════════════════════════

const DATA = {

  // ── REVENUES ──────────────────────────────────────────────────────
  revenue: [
    { label: 'Player Entries',    amount: 20740.00 },
    { label: 'Banquet Guests',    amount:   200.00 },
    { label: 'Zeffy Donations',   amount:   155.00 },
  ],

  // ── EXPENSES ──────────────────────────────────────────────────────
  expense: [
    { label: 'Tennis Venue',              amount: 4972.00 },
    { label: 'Trophies',                  amount: 2898.00 },
    { label: 'Tennis Balls',              amount: 1000.00 },
    { label: 'Banquet Facility Rental',   amount: 3747.00 },
    { label: 'Bibibop Lunch Day 1',       amount: 1127.00 },
    { label: 'Jimmy Johns Lunch Day 2',   amount:  744.75 },
    { label: 'Costco Snacks',             amount:  500.00 },
    { label: 'Welcome Party',             amount:  650.00 },
    { label: 'GLTA Fees',                 amount:  719.00 },
    { label: 'Square Fees',               amount:    0.00 },
    { label: 'Banquet Food',              amount: 2628.90 },
    { label: 'Shirts',                    amount: 2100.00 },
    { label: 'Photographer',              amount:  300.00 },
    { label: 'Coffee Bar',                amount:  500.00 },
    { label: 'Welcome Bags',              amount:  500.79 },
    { label: 'New Court Sponsor Signs',   amount:   48.38 },
  ],

  // ── ADDITIONAL INCOME ─────────────────────────────────────────────
  sponsor: [
    { label: 'Sponsorships',   amount: 6377.00 },
    { label: 'Raffle Contest', amount:    0.00 },
  ],

};

// ════════════════════════════════════════════════════════════════════
//  RENDERING — no need to edit below this line
// ════════════════════════════════════════════════════════════════════

function fmt(n) {
  if (n === 0) return '$ —';
  const str = Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return '$ ' + str;
}
function fmtNet(n) {
  const str = Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return (n < 0 ? '(' : '') + '$' + str + (n < 0 ? ')' : '');
}
function sum(arr) { return arr.reduce((a, r) => a + (r.amount || 0), 0); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderSection(section, colorClass) {
  const container = document.getElementById(section + '-items');
  container.innerHTML = DATA[section].map(row => `
    <div class="line-item">
      <span class="item-label">${esc(row.label)}</span>
      <span class="item-amount ${colorClass}">${fmt(row.amount)}</span>
    </div>
  `).join('');
}

function renderAll() {
  renderSection('revenue', 'revenue-amt');
  renderSection('expense', 'expense-amt');
  renderSection('sponsor', 'revenue-amt');

  const rev  = sum(DATA.revenue);
  const exp  = sum(DATA.expense);
  const spon = sum(DATA.sponsor);
  const net  = rev + spon - exp;

  document.getElementById('revenue-total').textContent = fmt(rev);
  document.getElementById('expense-total').textContent = fmt(exp);
  document.getElementById('sponsor-total').textContent = fmt(spon);

  const netEl = document.getElementById('net-amount');
  const banner = document.getElementById('net-banner');
  netEl.textContent = fmtNet(net);
  netEl.className = 'net-amount' + (net < 0 ? ' negative' : '');
  banner.className = 'net-banner' + (net < 0 ? ' negative' : '');
}

renderAll();
</script>
</body>
</html>
